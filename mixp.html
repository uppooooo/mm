<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MIX確率計算</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="./styles.cssmeta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
</head>

<body>
  <div class="container">
    <header>
      <h1>MIX確率計算</h1>
      <p>※ 半角数字で入力してください（リアルタイム計算）</p>
    </header>

    <main>
      <!-- 入力フォーム -->
      <form class="form-grid" novalidate>
        <label class="label" for="p">成功確率（%）</label>
        <input id="p" class="fld" type="number"
               min="0" max="100" step="1"
               inputmode="numeric" data-index="0" enterkeyhint="next">

        <label class="label" for="n">MIX回数</label>
        <input id="n" class="fld" type="number"
               min="1" step="1"
               inputmode="numeric" data-index="1" enterkeyhint="next">

        <label class="label" for="k">成功回数</label>
        <input id="k" class="fld" type="number"
               min="0" step="1"
               inputmode="numeric" data-index="2" enterkeyhint="done">
      </form>

      <!-- 結果表示 -->
      <section class="result-panel" aria-live="polite">
        <div class="row" id="r1">指定回数成功する確率：- ％</div>
        <div class="row total" id="r2">1回以上成功する確率：- ％</div>
      </section>

      <ul>
        <li><a href="./index.html></li>
      </ul>
    </main>
  </div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll('.fld'));
  const KEY = 'mix-prob.v1';
  const flds = $$('.fld').sort((a,b)=>+a.dataset.index - +b.dataset.index);

  function num(v){
    const n = Number(v);
    return Number.isFinite(n) ? n : NaN;
  }

  // 安定した二項分布（再帰計算）
  function binomP(n, k, p){
    if (p < 0 || p > 1 || k < 0 || k > n) return 0;
    if (n === 0) return k === 0 ? 1 : 0;

    let q = 1 - p;
    let pk = Math.pow(q, n); // k = 0

    for (let i = 1; i <= k; i++){
      pk = pk * ((n - (i - 1)) / i) * (p / q);
    }
    return pk;
  }

  function calc(){
    const p = num($('#p').value) / 100;
    const nVal = num($('#n').value);
    const kVal = num($('#k').value);

    if ([p, nVal, kVal].some(isNaN) || p < 0 || p > 1 || nVal < 1 || kVal < 0){
      $('#r1').textContent = '指定回数成功する確率：- ％';
      $('#r2').textContent = '1回以上成功する確率：- ％';
      return;
    }

    const exact = binomP(nVal, kVal, p) * 100;
    const atLeastOne = (1 - Math.pow(1 - p, nVal)) * 100;

    $('#r1').textContent =
      `指定回数成功する確率：${exact.toFixed(1)} ％`;
    $('#r2').textContent =
      `1回以上成功する確率：${atLeastOne.toFixed(1)} ％`;
  }

  /* 前回入力の復元 */
  try{
    const saved = localStorage.getItem(KEY);
    if (saved){
      const d = JSON.parse(saved);
      flds.forEach(f=>{
        if (d[f.id] != null) f.value = d[f.id];
      });
    }
  }catch{}

  /* 入力監視 */
  flds.forEach((f,i)=>{
    f.addEventListener('input', ()=>{
      calc();
      const d = {};
      flds.forEach(x => d[x.id] = x.value);
      localStorage.setItem(KEY, JSON.stringify(d));
    });

    f.addEventListener('keydown', e=>{
      if (e.key === 'Enter' || e.key === 'Tab'){
        e.preventDefault();
        if (flds[i+1]) flds[i+1].focus();
      }
    });
  });

  calc();
  flds[0].focus();
})();
</script>
</body>
</html>
