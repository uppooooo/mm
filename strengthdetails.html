<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>詳細強度計算</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
<div class="container">
  <header>
    <h1>詳細強度計算（速のみ）</h1>
    <p>レベルとステータスを入力すると強度を算出します。</p>
  </header>

  <main>
    <h2>入力</h2>

    <form class="form-grid cols-1" novalidate>

      <div class="row">
        <label class="label" style="min-width:4.5em;">Lv</label>
        <input id="level" class="fld" type="number" inputmode="numeric">
      </div>

      <div class="row">
        <label class="label" style="min-width:4.5em;">力</label>
        <input id="power" class="fld" type="number" inputmode="numeric">
      </div>

      <div class="row">
        <label class="label" style="min-width:4.5em;">敏捷</label>
        <input id="agi" class="fld" type="number" inputmode="numeric">
      </div>

      <div class="row">
        <label class="label" style="min-width:4.5em;">器用</label>
        <input id="dex" class="fld" type="number" inputmode="numeric">
      </div>

      <div class="row">
        <label class="label" style="min-width:4.5em;">幸運</label>
        <input id="luck" class="fld" type="number" inputmode="numeric">
      </div>

    </form>

    <div class="divider"></div>

    <h2>結果</h2>

    <section class="result-panel" aria-live="polite">
      <div class="row">力強度：<span id="out_power" class="total">-</span></div>
      <div class="row">敏捷強度：<span id="out_agi" class="total">-</span></div>
      <div class="row">器用強度：<span id="out_dex" class="total">-</span></div>
      <div class="row">幸運強度：<span id="out_luck" class="total">-</span></div>
      <div class="row">平均強度：<span id="out_avg" class="total">-</span></div>
    </section>

    <ul>
      <li><a href="https://uppooooo.github.io/mm/">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);

  function numFromInput(el){
    if (!el || el.value.trim() === '') return NaN;
    const v = Number(el.value);
    return Number.isFinite(v) ? v : NaN;
  }

  const fmt = v => Number.isFinite(v) ? v.toFixed(2) : '-';

  function calc(){
    const lv = numFromInput($('level'));
    if (!Number.isFinite(lv) || lv <= 0){
      ['out_power','out_agi','out_dex','out_luck','out_avg']
        .forEach(id => $(id).textContent='-');
      return;
    }

    const values = [];

    function calcStat(inputId, fn, outId){
      const raw = numFromInput($(inputId));
      if (!Number.isFinite(raw)) {
        $(outId).textContent='-';
        return;
      }
      const v = fn(raw);
      if (!Number.isFinite(v)) {
        $(outId).textContent='-';
        return;
      }
      $(outId).textContent = fmt(v);
      values.push(v);
    }

    calcStat('power', x => x/(1+lv), 'out_power');
    calcStat('agi',   x => (x-lv)/Math.round(lv/2), 'out_agi');
    calcStat('dex',   x => x/Math.floor(lv*1.5+2), 'out_dex');
    calcStat('luck',  x => x/(1+lv), 'out_luck');

    const avg = values.length
      ? values.reduce((a,b)=>a+b,0)/values.length
      : NaN;

    $('out_avg').textContent = fmt(avg);
  }

  document.querySelectorAll('.fld').forEach(el=>{
    el.addEventListener('input', calc);
    el.addEventListener('focus',()=>setTimeout(()=>el.select?.(),0));
  });

})();
</script>
</body>
</html>
