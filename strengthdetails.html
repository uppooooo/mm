<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>詳細強度計算</title>

  <link rel="stylesheet" href="./styles.css">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
</head>

<body>
<div class="container">
  <header>
    <h1>詳細強度計算（速のみ）</h1>
    <p>レベルとステータスを入力すると強度を算出します。</p>
  </header>

  <main>
    <h2>入力</h2>

    <form class="form-grid cols-1" novalidate>

      <div class="row">
        <label class="label" style="min-width:4.5em;">Lv</label>
        <input id="level" class="fld" type="number"
               min="1" inputmode="numeric" data-index="0">
      </div>

      <div class="row">
        <label class="label" style="min-width:4.5em;">力</label>
        <input id="power" class="fld" type="number"
               min="0" inputmode="numeric" data-index="1">
      </div>

      <div class="row">
        <label class="label" style="min-width:4.5em;">敏捷</label>
        <input id="agi" class="fld" type="number"
               min="0" inputmode="numeric" data-index="2">
      </div>

      <div class="row">
        <label class="label" style="min-width:4.5em;">器用</label>
        <input id="dex" class="fld" type="number"
               min="0" inputmode="numeric" data-index="3">
      </div>

      <div class="row">
        <label class="label" style="min-width:4.5em;">幸運</label>
        <input id="luck" class="fld" type="number"
               min="0" inputmode="numeric" data-index="4">
      </div>

    </form>

    <div class="divider"></div>

    <h2>結果</h2>

    <section class="result-panel" aria-live="polite">
      <div class="row">力強度：<span id="out_power" class="total">-</span></div>
      <div class="row">敏捷強度：<span id="out_agi" class="total">-</span></div>
      <div class="row">器用強度：<span id="out_dex" class="total">-</span></div>
      <div class="row">幸運強度：<span id="out_luck" class="total">-</span></div>
      <div class="row">平均強度：<span id="out_avg" class="total">-</span></div>
    </section>

    <ul>
      <li><a href="./index.html">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const inputs = Array.from(document.querySelectorAll('.fld'))
    .sort((a,b)=>+a.dataset.index-+b.dataset.index);

  const KEY = 'detail-strength.v3';
  const num = v => Number.isFinite(+v) ? +v : NaN;
  const fmt = v => Number.isFinite(v) ? v.toFixed(2) : '-';

  function calc(){
    const lv = num($('#level').value);
    if (!Number.isFinite(lv) || lv <= 0){
      out_power.textContent = '-';
      out_agi.textContent   = '-';
      out_dex.textContent   = '-';
      out_luck.textContent  = '-';
      out_avg.textContent   = '-';
      return;
    }

    const values = [];

    const power = num($('#power').value);
    if (Number.isFinite(power)) {
      const v = power / (1 + lv);
      out_power.textContent = fmt(v);
      values.push(v);
    } else {
      out_power.textContent = '-';
    }

    const agi = num($('#agi').value);
    if (Number.isFinite(agi)) {
      const v = (agi - lv) / Math.round(lv / 2);
      out_agi.textContent = fmt(v);
      values.push(v);
    } else {
      out_agi.textContent = '-';
    }

    const dex = num($('#dex').value);
    if (Number.isFinite(dex)) {
      const v = dex / Math.floor(lv * 1.5 + 2);
      out_dex.textContent = fmt(v);
      values.push(v);
    } else {
      out_dex.textContent = '-';
    }

    const luck = num($('#luck').value);
    if (Number.isFinite(luck)) {
      const v = luck / (1 + lv);
      out_luck.textContent = fmt(v);
      values.push(v);
    } else {
      out_luck.textContent = '-';
    }

    const avg = values.length
      ? values.reduce((a,b)=>a+b,0) / values.length
      : NaN;

    out_avg.textContent = fmt(avg);
  }

  try{
    const d = JSON.parse(localStorage.getItem(KEY));
    if (d) inputs.forEach(x => d[x.id] != null && (x.value = d[x.id]));
  }catch{}

  inputs.forEach(el=>{
    el.addEventListener('focus',()=>setTimeout(()=>el.select?.(),0));
    el.addEventListener('input',()=>{
      calc();
      const d={};
      inputs.forEach(x=>d[x.id]=x.value);
      localStorage.setItem(KEY, JSON.stringify(d));
    });
  });

  calc();
  inputs[0]?.focus();
})();
</script>
</body>
</html>
