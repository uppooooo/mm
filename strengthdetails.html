<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>詳細強度計算</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
<div class="container">
  <header>
    <h1>詳細強度計算（速のみ）</h1>
  </header>

  <main>
    <form class="form-grid cols-1" novalidate>

      <div class="row"><label class="label">Lv</label>
        <input id="level" class="fld" type="number"></div>

      <div class="row"><label class="label">力</label>
        <input id="power" class="fld" type="number"></div>

      <div class="row"><label class="label">敏捷</label>
        <input id="agi" class="fld" type="number"></div>

      <div class="row"><label class="label">器用</label>
        <input id="dex" class="fld" type="number"></div>

      <div class="row"><label class="label">幸運</label>
        <input id="luck" class="fld" type="number"></div>

    </form>

    <section class="result-panel">
      <div>力強度：<span id="out_power">-</span></div>
      <div>敏捷強度：<span id="out_agi">-</span></div>
      <div>器用強度：<span id="out_dex">-</span></div>
      <div>幸運強度：<span id="out_luck">-</span></div>
      <div>平均強度：<span id="out_avg">-</span></div>
    </section>
  </main>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);

  function numFromInput(el){
    if (!el || el.value.trim() === '') return NaN;
    const v = Number(el.value);
    return Number.isFinite(v) ? v : NaN;
  }

  const fmt = v => Number.isFinite(v) ? v.toFixed(2) : '-';

  function calc(){
    const lv = numFromInput($('level'));
    if (!Number.isFinite(lv) || lv <= 0){
      ['out_power','out_agi','out_dex','out_luck','out_avg']
        .forEach(id => $(id).textContent='-');
      return;
    }

    const values = [];

    function calcStat(inputId, fn, outId){
      const raw = numFromInput($(inputId));
      if (!Number.isFinite(raw)) {
        $(outId).textContent='-';
        return;
      }
      const v = fn(raw);
      if (!Number.isFinite(v)) {
        $(outId).textContent='-';
        return;
      }
      $(outId).textContent = fmt(v);
      values.push(v);
    }

    calcStat('power', x => x/(1+lv), 'out_power');
    calcStat('agi',   x => (x-lv)/Math.round(lv/2), 'out_agi');
    calcStat('dex',   x => x/Math.floor(lv*1.5+2), 'out_dex');
    calcStat('luck',  x => x/(1+lv), 'out_luck');

    const avg = values.length
      ? values.reduce((a,b)=>a+b,0)/values.length
      : NaN;

    $('out_avg').textContent = fmt(avg);
  }

  document.querySelectorAll('.fld').forEach(el=>{
    el.addEventListener('input', calc);
  });

})();
</script>
</body>
</html>
