<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>詳細強度計算</title>

  <link rel="stylesheet" href="./styles.css">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
</head>

<body>
<div class="container">
  <header>
    <h1>詳細強度計算（速のみ）</h1>
    <p>レベルとステータスを入力すると強度を算出します。</p>
  </header>

  <main>
    <h2>入力</h2>

    <!-- 入力フォーム（iPhoneでも1行） -->
    <form class="form-grid cols-1" novalidate>

      <div class="row">
        <label class="label" for="level" style="min-width:4.5em;">Lv</label>
        <input id="level" name="level" class="fld" type="number"
               min="1" max="999" inputmode="numeric" data-index="0">
      </div>

      <div class="row">
        <label class="label" for="power" style="min-width:4.5em;">力</label>
        <input id="power" name="power" class="fld" type="number"
               min="0" max="99999" inputmode="numeric" data-index="1">
      </div>

      <div class="row">
        <label class="label" for="agi" style="min-width:4.5em;">敏捷</label>
        <input id="agi" name="agi" class="fld" type="number"
               min="0" max="99999" inputmode="numeric" data-index="2">
      </div>

      <div class="row">
        <label class="label" for="dex" style="min-width:4.5em;">器用</label>
        <input id="dex" name="dex" class="fld" type="number"
               min="0" max="99999" inputmode="numeric" data-index="3">
      </div>

      <div class="row">
        <label class="label" for="luck" style="min-width:4.5em;">幸運</label>
        <input id="luck" name="luck" class="fld" type="number"
               min="0" max="99999" inputmode="numeric" data-index="4">
      </div>

    </form>

    <div class="divider"></div>

    <h2>結果</h2>

    <section class="result-panel" aria-live="polite">
      <div class="row">力強度：<span id="out_power" class="total">-</span></div>
      <div class="row">敏捷強度：<span id="out_agi" class="total">-</span></div>
      <div class="row">器用強度：<span id="out_dex" class="total">-</span></div>
      <div class="row">幸運強度：<span id="out_luck" class="total">-</span></div>
      <div class="row">平均強度：<span id="out_avg" class="total">-</span></div>
    </section>

    <ul>
      <li><a href="./index.html">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const $ = s=>document.querySelector(s);
  const inputs=[...document.querySelectorAll('.fld')]
    .sort((a,b)=>+a.dataset.index-+b.dataset.index);
  const KEY='detail-strength.v1';

  const num=v=>Number.isFinite(+v)?+v:NaN;
  const fix=v=>Number.isFinite(v)?v.toFixed(2):'-';

  function calc(){
    const lv=num(level.value);
    if(!Number.isFinite(lv)||lv<=0){ render('-', '-', '-', '-', '-'); return; }

    const p=num(power.value)/(1+lv);
    const a=num(agi.value)?(agi.value-lv)/Math.round(lv/2):NaN;
    const d=num(dex.value)?dex.value/Math.floor(lv*1.5+2):NaN;
    const l=num(luck.value)/(1+lv);

    const vals=[p,a,d,l].filter(Number.isFinite);
    const avg=vals.length?vals.reduce((x,y)=>x+y,0)/vals.length:NaN;

    out_power.textContent=fix(p);
    out_agi.textContent=fix(a);
    out_dex.textContent=fix(d);
    out_luck.textContent=fix(l);
    out_avg.textContent=fix(avg);
  }

  function render(a,b,c,d,e){
    out_power.textContent=a;
    out_agi.textContent=b;
    out_dex.textContent=c;
    out_luck.textContent=d;
    out_avg.textContent=e;
  }

  try{
    const d=JSON.parse(localStorage.getItem(KEY));
    if(d) inputs.forEach(x=>d[x.name]!=null&&(x.value=d[x.name]));
  }catch{}

  inputs.forEach((el,i)=>{
    el.addEventListener('focus',()=>setTimeout(()=>el.select?.(),0));
    el.addEventListener('input',()=>{
      calc();
      const d={}; inputs.forEach(x=>d[x.name]=x.value);
      localStorage.setItem(KEY,JSON.stringify(d));
    });
    el.addEventListener('keydown',e=>{
      if(e.key==='Enter'){ e.preventDefault();
        (e.shiftKey?inputs[i-1]:inputs[i+1])?.focus();
      }
    });
  });

  calc(); inputs[0]?.focus();
})();
</script>
</body>
</html>
