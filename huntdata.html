<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ハントデータ</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="./styles.css">

  <!-- ラベル改行防止（最小補足） -->
  <style>
    .form-grid.cols-2 .label {
      white-space: nowrap;   /* ← 1行固定 */
    }
  </style>
</head>

<body>
<div class="container">
  <header>
    <h1>ハントデータ</h1>
    <p>半角数字で入力してください。</p>
  </header>

  <main>
    <!-- 入力フォーム：ラベル＋入力を1行 -->
    <form class="form-grid cols-2" novalidate>
      <label class="label" for="time">狩り時間（分）</label>
      <input id="time" class="fld" type="number">

      <label class="label" for="gpi">初期GP</label>
      <input id="gpi" class="fld" type="number">

      <label class="label" for="gpf">最終GP</label>
      <input id="gpf" class="fld" type="number">

      <label class="label" for="gp1">取得GP／匹①</label>
      <input id="gp1" class="fld" type="number">

      <label class="label" for="gp2">取得GP／匹②</label>
      <input id="gp2" class="fld" type="number">

      <label class="label" for="gp3">取得GP／匹③</label>
      <input id="gp3" class="fld" type="number">

      <label class="label" for="gp4">取得GP／匹④</label>
      <input id="gp4" class="fld" type="number">

      <label class="label" for="gp5">取得GP／匹⑤</label>
      <input id="gp5" class="fld" type="number">

      <label class="label" for="exp">経験値／匹</label>
      <input id="exp" class="fld" type="number">

      <label class="label" for="expi">初期経験値（%）</label>
      <input id="expi" class="fld" type="number" step="0.01">

      <label class="label" for="expf">最終経験値（%）</label>
      <input id="expf" class="fld" type="number" step="0.01">
    </form>

    <!-- 結果 -->
    <section class="result-panel" aria-live="polite">
      <div class="row">【取得GP】</div>
      <div class="row" id="r_avg">平均取得GP／匹：-</div>
      <div class="row" id="r_total">総取得GP：-</div>
      <div class="row" id="r_gp_min">取得GP／分：-</div>
      <div class="row" id="r_gp_hour">取得GP／時：-</div>

      <div class="row">【狩り数】</div>
      <div class="row" id="r_hunts">総狩り数：-</div>
      <div class="row" id="r_hunts_min">狩り数／分：-</div>
      <div class="row" id="r_hunts_hour">狩り数／時：-</div>

      <div class="row">【獲得経験値】</div>
      <div class="row" id="r_exp">取得経験値（%）：-</div>
      <div class="row" id="r_exp_hour">取得経験値／時（%）：-</div>
      <div class="row" id="r_exp_total">総獲得経験値：-</div>
    </section>

    <ul>
      <li><a href="./index.html">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);

  function numFromInput(el){
    if (!el || el.value.trim()==='') return NaN;
    const v = Number(el.value);
    return Number.isFinite(v) ? v : NaN;
  }

  function calc(){
    const gpVals=[];
    for(let i=1;i<=5;i++){
      const v=numFromInput($('gp'+i));
      if(Number.isFinite(v)) gpVals.push(v);
    }
    const avgGp = gpVals.length ? gpVals.reduce((a,b)=>a+b,0)/gpVals.length : NaN;
    $('r_avg').textContent = `平均取得GP／匹：${Number.isFinite(avgGp)?avgGp.toLocaleString():'-'}`;

    const gpi=numFromInput($('gpi'));
    const gpf=numFromInput($('gpf'));
    const time=numFromInput($('time'));

    if(Number.isFinite(gpi)&&Number.isFinite(gpf)){
      const diff=gpf-gpi;
      $('r_total').textContent=`総取得GP：${diff.toLocaleString()}`;
      if(Number.isFinite(time)&&time>0){
        const gpMin=Math.floor(diff/time);
        $('r_gp_min').textContent=`取得GP／分：${gpMin.toLocaleString()}`;
        $('r_gp_hour').textContent=`取得GP／時：${(gpMin*60).toLocaleString()}`;
      }
    }

    if(Number.isFinite(avgGp)&&avgGp>0&&Number.isFinite(gpi)&&Number.isFinite(gpf)&&Number.isFinite(time)&&time>0){
      const hunts=Math.floor((gpf-gpi)/avgGp);
      $('r_hunts').textContent=`総狩り数：${hunts.toLocaleString()}`;
      $('r_hunts_min').textContent=`狩り数／分：${Math.floor(hunts/time).toLocaleString()}`;
      $('r_hunts_hour').textContent=`狩り数／時：${(Math.floor(hunts/time)*60).toLocaleString()}`;
    }

    const exp=numFromInput($('exp'));
    const expi=numFromInput($('expi'));
    const expf=numFromInput($('expf'));

    if(Number.isFinite(expi)&&Number.isFinite(expf)){
      const gain=expf-expi;
      $('r_exp').textContent=`取得経験値（%）：${gain.toFixed(2)}`;
      if(Number.isFinite(time)&&time>0){
        $('r_exp_hour').textContent=`取得経験値／時（%）：${((gain/time)*60).toFixed(2)}`;
      }
    }
    if(Number.isFinite(exp)&&Number.isFinite(avgGp)&&avgGp>0&&Number.isFinite(gpi)&&Number.isFinite(gpf)){
      const hunts=Math.floor((gpf-gpi)/avgGp);
      $('r_exp_total').textContent=`総獲得経験値：${(exp*hunts).toLocaleString()}`;
    }
  }

  document.querySelectorAll('.fld').forEach(el=>{
    el.addEventListener('input',calc);
  });
})();
</script>
</body>
</html>
