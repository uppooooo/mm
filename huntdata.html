<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ハントデータ</title>

  <!-- iPhone 最適化（他ページと統一） -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <style>
    :root{
      --bg:#f7f8fb;
      --panel:#ffffff;
      --ink:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --accent:#2563eb;
      --accent-weak:#e7efff;
    }
    *{box-sizing:border-box}
    html,body{margin:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,
        "Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic","Noto Sans JP",Meiryo,sans-serif;
      background:var(--bg);
      color:var(--ink);
      font-weight:400;
    }
    .wrap{
      max-width:900px;
      margin:24px auto;
      padding:24px;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:12px;
      box-shadow:0 2px 12px rgba(0,0,0,.05);
    }
    h1{
      font-size:clamp(1.4rem,1.1rem + 1vw,2rem);
      margin:0 0 8px;
      color:#888;
    }
    p{color:#333}

    h2{
      width:100%;
      margin:18px 0 10px;
      font-size:1.1rem;
      border-left:4px solid var(--accent);
      padding-left:10px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 160px;
      gap:12px 16px;
      align-items:center;
    }
    @media (max-width:600px){
      .grid{ grid-template-columns:1fr; }
    }

    label{color:var(--muted)}
    input[type="number"]{
      width:100%;
      padding:10px 12px;
      font-size:1rem;
      border-radius:8px;
      border:1px solid var(--border);
      background:#fff;
    }
    input:focus{
      outline:none;
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-weak);
    }

    .result{
      margin-top:20px;
      padding:16px;
      background:#fbfdff;
      border:1px dashed var(--border);
      border-radius:10px;
    }
    .row{margin-bottom:6px}

    ul{height:auto; padding-left:20px; margin-top:16px}
  </style>
</head>

<body>
<div class="wrap">
  <header>
    <h1>ハントデータ</h1>
    <p>※ 半角数字で入力してください（リアルタイム計算）</p>
  </header>

  <main>
    <h2>入力</h2>
    <form id="form" class="grid" novalidate>
      <label>狩り時間（分）</label>
      <input id="time" name="time" class="fld" type="number" inputmode="numeric" data-index="0" enterkeyhint="next">

      <label>初期GP</label>
      <input id="gpi" name="gpi" class="fld" type="number" inputmode="numeric" data-index="1" enterkeyhint="next">

      <label>最終GP</label>
      <input id="gpf" name="gpf" class="fld" type="number" inputmode="numeric" data-index="2" enterkeyhint="next">

      <label>取得GP／匹 ①</label>
      <input id="gp1" name="gp1" class="fld" type="number" inputmode="numeric" data-index="3" enterkeyhint="next">

      <label>取得GP／匹 ②</label>
      <input id="gp2" name="gp2" class="fld" type="number" inputmode="numeric" data-index="4" enterkeyhint="next">

      <label>取得GP／匹 ③</label>
