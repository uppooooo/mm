<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>価格計算</title>
</head>
<body>
  <h2>MC計算</h2>
  <form id="priceCalculator">
    <label for="basePrice">MC定価：</label>
    <input type="number" id="basePrice" value="320" step="any" required size="6">
    <span>MC</span><br><br>

    <label for="purchaseQuantity">購入数：</label>
    <input type="number" id="purchaseQuantity" value="1" required size="4"><br><br>

    <label for="market">100MC=：</label>
    <input type="number" id="market" value="14.0" step="0.1" required size="5">
    <span>mGP</span><br><br>

    <label>セール：</label><br>
    <input type="radio" id="noDiscount" name="discount" value="0" checked>
    <label for="noDiscount">0%</label><br>

    <input type="radio" id="twentyPercentDiscount" name="discount" value="0.2">
    <label for="twentyPercentDiscount">20%</label><br>

    <input type="radio" id="thirtyPercentDiscount" name="discount" value="0.3">
    <label for="thirtyPercentDiscount">30%</label><br><br>

    <label for="quantity">セット個数：</label>
    <input type="number" id="quantity" value="100" required size="4"><br><br>

    <button type="button" onclick="calculatePrice()">計算する</button><br><br>

    <label for="result">価格：</label>
    <input type="text" id="result" readonly style="display:none">
    <span id="resultLabel" style="display:none">GP</span><br><br>

    <label for="unitPrice">単価：</label>
    <input type="text" id="unitPrice" readonly style="display:none">
    <span id="unitPriceLabel" style="display:none">GP</span>
  </form>

  <script>
    function calculatePrice() {
      var basePrice = parseFloat(document.getElementById('basePrice').value);
      var market = parseFloat(document.getElementById('market').value);
      var discount = parseFloat(document.querySelector('input[name="discount"]:checked').value);
      var quantity = parseFloat(document.getElementById('quantity').value);
      var purchaseQuantity = parseFloat(document.getElementById('purchaseQuantity').value);
  
      // 20%割引の場合、100% - 20% = 80% の価格を計算する
      var discountedPrice = 1 - discount;
  
      var totalPrice = basePrice * discountedPrice * market * purchaseQuantity * 10000;
      document.getElementById('result').value = totalPrice.toLocaleString('ja-JP', { style: 'currency', currency: 'JPY' });
      document.getElementById('result').style.display = 'inline';
      document.getElementById('resultLabel').style.display = 'inline';

      var unitPrice = totalPrice / quantity / purchaseQuantity;
      document.getElementById('unitPrice').value = unitPrice.toLocaleString('ja-JP', { style: 'currency', currency: 'JPY' });
      document.getElementById('unitPrice').style.display = 'inline';
      document.getElementById('unitPriceLabel').style.display = 'inline';
    }
  </script>

<ul>
 <li><a href="https://uppooooo.github.io/mm/">トップページ</a></li>
</ul>

</body>
</html>
