<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MC計算</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="./styles.css">

  <!-- iPhone 最適化 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
</head>

<body>
  <div class="container">
    <header>
      <h1>MC計算</h1>
      <p>半角数字で入力してください。</p>
    </header>

    <main>
      <!-- 入力フォーム（1項目＝1行） -->
      <form class="form-grid cols-1" novalidate>
        <label class="label" for="basePrice">MC定価</label>
        <input id="basePrice" name="basePrice" class="fld" type="number"
               step="any" value="320" data-index="0">

        <label class="label" for="purchaseQuantity">購入数</label>
        <input id="purchaseQuantity" name="purchaseQuantity" class="fld" type="number"
               value="1" data-index="1">

        <label class="label" for="market">100MC =</label>
        <input id="market" name="market" class="fld" type="number"
               step="0.1" value="14.0" data-index="2">

        <label class="label" for="quantity">セット個数</label>
        <input id="quantity" name="quantity" class="fld" type="number"
               value="100" data-index="3">
      </form>

      <!-- セール -->
      <p class="label" style="margin-top:14px;">セール</p>
      <div class="row">
        <label><input type="radio" name="discount" value="0" checked> 0%</label>
        <label><input type="radio" name="discount" value="0.2"> 20%</label>
        <label><input type="radio" name="discount" value="0.3"> 30%</label>
      </div>

      <!-- 結果 -->
      <section class="result-panel" aria-live="polite">
        <div class="row" id="totalResult">価格：- GP</div>
        <div class="row total" id="unitResult">単価：- GP</div>
      </section>

      <ul>
        <li><a href="./index.html">トップページ</a></li>
      </ul>
    </main>
  </div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll('.fld'));
  const KEY = 'mc-calc.v1';
  const flds = $$('.fld').sort((a,b)=>+a.dataset.index-+b.dataset.index);

  function n(v){
    const x = Number(v);
    return Number.isFinite(x) ? x : NaN;
  }

  function calc(){
    const base = n($('#basePrice').value);
    const market = n($('#market').value);
    const quantity = n($('#quantity').value);
    const purchase = n($('#purchaseQuantity').value);
    const discount = n(document.querySelector('input[name="discount"]:checked').value);

    if ([base, market, quantity, purchase, discount].some(isNaN)) return;

    const discounted = 1 - discount;
    const total = base * discounted * market * purchase * 10000;
    const unit = total / quantity / purchase;

    $('#totalResult').textContent =
      `価格：${Math.floor(total).toLocaleString()} GP`;
    $('#unitResult').textContent =
      `単価：${Math.floor(unit).toLocaleString()} GP`;
  }

  /* 前回入力の復元 */
  try{
    const raw = localStorage.getItem(KEY);
    if (raw){
      const data = JSON.parse(raw);
      flds.forEach(f=>{
        if (data[f.id] != null) f.value = data[f.id];
      });
      const r = document.querySelector(`input[name="discount"][value="${data.discount}"]`);
      if (r) r.checked = true;
    }
  }catch{}

  /* 入力・フォーカス・キー操作 */
  flds.forEach((el,i)=>{
    // フォーカス時は全選択（iOS Safari 対策）
    el.addEventListener('focus', ()=>{
      setTimeout(()=>el.select(), 0);
    });

    // 入力時再計算＋保存
    el.addEventListener('input', ()=>{
      calc();
      const d = {};
      flds.forEach(x=>d[x.id]=x.value);
      d.discount = document.querySelector('input[name="discount"]:checked').value;
      localStorage.setItem(KEY, JSON.stringify(d));
    });

    // Enter / Shift+Enter で上下移動
    el.addEventListener('keydown', e=>{
      if (e.key === 'Enter'){
        e.preventDefault();
        if (e.shiftKey){
          if (flds[i-1]) flds[i-1].focus();
        } else {
          if (flds[i+1]) flds[i+1].focus();
        }
      }
      // Tab / Shift+Tab はブラウザ標準
    });
  });

  // セール変更
  document.querySelectorAll('input[name="discount"]').forEach(r=>{
    r.addEventListener('change', ()=>{
      calc();
      const d = {};
      flds.forEach(x=>d[x.id]=x.value);
      d.discount = document.querySelector('input[name="discount"]:checked').value;
      localStorage.setItem(KEY, JSON.stringify(d));
    });
  });

  calc();
