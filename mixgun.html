<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MC計算</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="./styles.css">

  <!-- iPhone 最適化 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
</head>

<body>
<div class="container">
  <header>
    <h1>MC計算</h1>
    <p>半角数字で入力してください。</p>
  </header>

  <main>
    <!-- 入力フォーム（意味順に再配置） -->
    <form class="form-grid cols-1" novalidate>

      <!-- 100MC -->
      <label class="label" for="market">100MC =</label>
      <input id="market" class="fld" type="number"
             step="0.1" value="14.0" data-index="0">

      <!-- MC定価 -->
      <label class="label" for="basePrice">MC定価</label>
      <input id="basePrice" class="fld" type="number"
             step="any" value="320" data-index="1">

      <!-- 購入数 -->
      <label class="label" for="purchaseQuantity">購入数</label>
      <input id="purchaseQuantity" class="fld" type="number"
             value="1" data-index="2">

      <!-- セット -->
      <label class="label" for="quantity">セット個数</label>
      <input id="quantity" class="fld" type="number"
             value="100" data-index="3">
    </form>

    <!-- セール -->
    <p class="label" style="margin-top:14px;">セール</p>
    <div class="row">
      <label><input type="radio" name="discount" value="0" checked> 0%</label>
      <label><input type="radio" name="discount" value="0.2"> 20%</label>
      <label><input type="radio" name="discount" value="0.3"> 30%</label>
    </div>

    <!-- 結果 -->
    <section class="result-panel" aria-live="polite">
      <div class="row" id="mcResult">MC価格：- MC</div>
      <div class="divider"></div>
      <div class="row" id="totalResult">価格：- GP</div>
      <div class="row total" id="unitResult">単価：- GP</div>
    </section>

    <ul>
      <li><a href="./index.html">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const flds = Array.from(document.querySelectorAll('.fld'))
    .sort((a,b)=>+a.dataset.index-+b.dataset.index);

  const KEY = 'mc-calc.v2';

  const n = v => Number.isFinite(+v) ? +v : NaN;

  function calc(){
    const base = n($('#basePrice').value);
    const market = n($('#market').value);
    const quantity = n($('#quantity').value);
    const purchase = n($('#purchaseQuantity').value);
    const discount = n(document.querySelector('input[name="discount"]:checked').value);

    if ([base, market, quantity, purchase, discount].some(isNaN)) return;

    /* MC価格（純MC） */
    const mcPrice = base * (1 - discount) * purchase;

    /* GP換算 */
    const totalGp = mcPrice * market * 10000;
    const unitGp  = totalGp / quantity / purchase;

    $('#mcResult').textContent =
      `MC価格：${Math.floor(mcPrice).toLocaleString()} MC`;

    $('#totalResult').textContent =
      `価格：${Math.floor(totalGp).toLocaleString()} GP`;

    $('#unitResult').textContent =
      `単価：${Math.floor(unitGp).toLocaleString()} GP`;
  }

  /* 保存復元 */
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){
      const d = JSON.parse(raw);
      flds.forEach(f=>{ if(d[f.id]!=null) f.value=d[f.id]; });
      const r = document.querySelector(
        `input[name="discount"][value="${d.discount}"]`
      );
      if(r) r.checked = true;
    }
  }catch{}

  /* イベント */
  flds.forEach((el,i)=>{
    el.addEventListener('focus',()=>setTimeout(()=>el.select(),0));
    el.addEventListener('input',()=>{
      calc();
      const d={};
      flds.forEach(x=>d[x.id]=x.value);
      d.discount=document.querySelector('input[name="discount"]:checked').value;
      localStorage.setItem(KEY,JSON.stringify(d));
    });
    el.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        (e.shiftKey?flds[i-1]:flds[i+1])?.focus();
      }
    });
  });

  document.querySelectorAll('input[name="discount"]').forEach(r=>{
    r.addEventListener('change',()=>{
      calc();
      const d={};
      flds.forEach(x=>d[x.id]=x.value);
      d.discount=document.querySelector('input[name="discount"]:checked').value;
      localStorage.setItem(KEY,JSON.stringify(d));
    });
  });

  calc();
  flds[0]?.focus();
})();
</script>
</body>
</html>
``
