<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MC計算</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="./styles.css">

  <!-- iPhone 表示最適化 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
</head>

<body>
  <div class="container">
    <header>
      <h1>MC計算</h1>
      <p>※ 半角数字で入力してください（リアルタイム計算）</p>
    </header>

    <main>
      <!-- 入力フォーム -->
      <form id="form" class="form-grid" novalidate>
        <label class="label">MC定価</label>
        <input id="basePrice" name="basePrice" class="fld" type="number"
               step="any" value="320" data-index="0" enterkeyhint="next">

        <label class="label">購入数</label>
        <input id="purchaseQuantity" name="purchaseQuantity" class="fld" type="number"
               value="1" data-index="1" enterkeyhint="next">

        <label class="label">100MC =</label>
        <input id="market" name="market" class="fld" type="number"
               step="0.1" value="14.0" data-index="2" enterkeyhint="next">

        <label class="label">セット個数</label>
        <input id="quantity" name="quantity" class="fld" type="number"
               value="100" data-index="3" enterkeyhint="done">
      </form>

      <!-- セール -->
      <p style="margin-top:12px;" class="label">セール</p>
      <div class="row">
        <label><input type="radio" name="discount" value="0" checked> 0%</label>
        <label><input type="radio" name="discount" value="0.2"> 20%</label>
        <label><input type="radio" name="discount" value="0.3"> 30%</label>
      </div>

      <!-- 結果 -->
      <section class="result-panel" aria-live="polite">
        <div class="row" id="totalResult">価格：- GP</div>
        <div class="row total" id="unitResult">単価：- GP</div>
      </section>

      <ul>
        <li><a href="./index.html">トップページ</a></li>
      </ul>
    </main>
  </div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll('.fld'));
  const KEY = 'mc-calc.v1';

  function n(v){
    const x = Number(v);
    return Number.isFinite(x) ? x : NaN;
  }

  function calc(){
    const base = n($('#basePrice').value);
    const market = n($('#market').value);
    const quantity = n($('#quantity').value);
    const purchase = n($('#purchaseQuantity').value);
    const discount = n(document.querySelector('input[name="discount"]:checked').value);

    if ([base, market, quantity, purchase, discount].some(isNaN)) return;

    const discounted = 1 - discount;
    const total = base * discounted * market * purchase * 10000;
    const unit = total / quantity / purchase;

    $('#totalResult').textContent =
      `価格：${Math.floor(total).toLocaleString()} GP`;
    $('#unitResult').textContent =
      `単価：${Math.floor(unit).toLocaleString()} GP`;
  }

  /* 前回入力の復元 */
  try{
    const raw = localStorage.getItem(KEY);
    if (raw){
      const data = JSON.parse(raw);
      Object.keys(data).forEach(k=>{
        const el = document.getElementById(k);
        if (el) el.value = data[k];
      });
      const r = document.querySelector(`input[name="discount"][value="${data.discount}"]`);
      if (r) r.checked = true;
    }
  }catch(e){}

  /* 入力監視 */
  const flds = $$('.fld');
  flds.forEach((f,i)=>{
    f.addEventListener('input', ()=>{
      calc();
      save();
    });
    f.addEventListener('keydown', e=>{
      if (e.key === 'Enter' || e.key === 'Tab'){
        e.preventDefault();
        if (flds[i+1]) flds[i+1].focus();
      }
    });
  });

  document.querySelectorAll('input[name="discount"]').forEach(r=>{
    r.addEventListener('change', ()=>{
      calc();
      save();
    });
  });

  function save(){
    const d = {};
    flds.forEach(f => d[f.id] = f.value);
    d.discount = document.querySelector('input[name="discount"]:checked').value;
    localStorage.setItem(KEY, JSON.stringify(d));
  }

  calc();
  flds[0].focus();
})();
</script>
</body>
</html>
