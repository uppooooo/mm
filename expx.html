<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>取得経験値倍率計算</title>

  <!-- iPhone / UI 最適化 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <style>
    :root{
      --bg:#f7f8fb;
      --panel:#ffffff;
      --ink:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --accent:#2563eb;
      --accent-weak:#e7efff;
    }
    *{box-sizing:border-box}
    html,body{margin:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,
        "Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic","Noto Sans JP",Meiryo,sans-serif;
      background:var(--bg);
      color:var(--ink);
      font-weight:400;
    }
    .wrap{
      max-width:720px;
      margin:24px auto;
      padding:24px;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:12px;
      box-shadow:0 2px 12px rgba(0,0,0,.05);
    }
    h1{
      font-size:clamp(1.4rem,1.1rem + 1vw,2rem);
      margin:0 0 8px;
      color:#888;
    }
    p{color:#333}
    h2{width:100%}

    .grid{
      display:grid;
      grid-template-columns:1fr 120px;
      gap:12px 16px;
      align-items:center;
      margin-top:12px;
    }
    @media (max-width:520px){
      .grid{grid-template-columns:1fr}
    }

    label{color:var(--muted)}
    input[type="number"]{
      width:100%;
      padding:10px 12px;
      font-size:1rem;
      border-radius:8px;
      border:1px solid var(--border);
      background:#fff;
    }
    input:focus{
      outline:none;
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-weak);
    }

    .result{
      margin-top:20px;
      padding:16px;
      background:#fbfdff;
      border:1px dashed var(--border);
      border-radius:10px;
    }
    .row{margin-bottom:6px}

    ul{height:auto; padding-left:20px; margin-top:16px}
    ol{background-color:#f8fafc}

  </style>
</head>

<body>
<div class="wrap">
  <header>
    <h1>取得経験値倍率計算</h1>
    <p>※ 半角数字で入力してください（リアルタイム計算）</p>
  </header>

  <main>
    <form id="form" class="grid" novalidate>
      <label for="a">マスター</label>
      <input id="a" name="a" class="fld" type="number" inputmode="numeric" enterkeyhint="next" data-index="0">

      <label for="b">メイト1</label>
      <input id="b" name="b" class="fld" type="number" inputmode="numeric" enterkeyhint="next" data-index="1">

      <label for="c">メイト2</label>
      <input id="c" name="c" class="fld" type="number" inputmode="numeric" enterkeyhint="next" data-index="2">

      <label for="d">メイト3</label>
      <input id="d" name="d" class="fld" type="number" inputmode="numeric" enterkeyhint="next" data-index="3">

      <label for="e">敵レベル</label>
      <input id="e" name="e" class="fld" type="number" inputmode="numeric" enterkeyhint="done" data-index="4">
    </form>

    <section class="result" aria-live="polite">
      <div class="row" id="averageResult">メイト平均レベル: -</div>
      <div class="row" id="differenceResult">レベル差: -</div>
      <div class="row" id="ratioResult">経験値倍率: -</div>
    </section>

    <ul>
      <li><a href="https://uppooooo.github.io/mm/">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));
  const STORAGE_KEY = 'exp-ratio.v1';
  const inputs = $$('.fld').sort((a,b)=>+a.dataset.index-+b.dataset.index);

  function toNum(v){ const n = Number(v); return Number.isFinite(n)?n:NaN; }

  function calc(){
    const a = toNum($('#a').value);
    const b = toNum($('#b').value);
    const c = toNum($('#c').value);
    const d = toNum($('#d').value);
    const e = toNum($('#e').value);

    let sum = 0, count = 0;
    if (!isNaN(a)){ sum+=a; count++; }
    if (!isNaN(b) && Math.abs(a-b)<=15){ sum+=b; count++; }
    if (!isNaN(c) && Math.abs(a-c)<=15){ sum+=c; count++; }
    if (!isNaN(d) && Math.abs(a-d)<=15){ sum+=d; count++; }

    if (count===0 || isNaN(e)){
      $('#averageResult').textContent = '条件を満たす値を入力してください。';
      $('#differenceResult').textContent = '';
      $('#ratioResult').textContent = '';
      return;
    }

    const avg = sum/count;
    const diff = e - avg;

    let text='', ratio='';
    if (diff<=-9){ text='灰色'; ratio='1/8'; }
    else if (diff<=-4){ text='緑色'; ratio='2/8'; }
    else if (diff<=-1){ text='黄４'; ratio='4/8'; }
    else if (diff<=2){ text='黄３'; ratio='6/8'; }
    else if (diff<=4){ text='黄２'; ratio='7.2/8'; }
    else if (diff<=7){ text='黄１'; ratio='8/8'; }
    else if (diff<14){ text='橙色'; ratio='8/8'; }
    else{ text='赤色'; ratio='8/8'; }

    $('#averageResult').textContent = `メイト平均レベル: ${avg.toFixed(2)}`;
    $('#differenceResult').textContent = `レベル差: ${diff.toFixed(2)} (${text})`;
    $('#ratioResult').textContent = `経験値倍率: ${ratio}`;
  }

  // 復元
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw){
      const data = JSON.parse(raw);
      inputs.forEach(i=>{ if(data[i.name]!=null) i.value=data[i.name]; });
    }
  }catch{}

  inputs.forEach(el=>{
    el.addEventListener('input', ()=>{
      calc();
      const data={};
      inputs.forEach(i=>data[i.name]=i.value);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    });

    el.addEventListener('keydown', e=>{
      if(e.key==='Enter' || e.key==='Tab'){
        e.preventDefault();
        const i=inputs.indexOf(el);
        if(i<inputs.length-1) inputs[i+1].focus();
      }
    });
  });

  calc();
  inputs[0].focus();
})();
</script>

</body>
</html>
