<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>取得経験値倍率計算</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="./styles.css">

  <!-- iPhone 最適化 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
</head>

<body>
<div class="container">
  <header>
    <h1>取得経験値倍率計算</h1>
    <p>レベルを半角数字で入力してください。</p>
  </header>

  <main>
    <!-- 入力（iPhoneでも1行） -->
    <form class="form-grid cols-1" novalidate>

      <div class="row">
        <label class="label" for="a" style="min-width:6em;">マスター</label>
        <input id="a" name="a" class="fld" type="number"
               inputmode="numeric" data-index="0" enterkeyhint="next">
      </div>

      <div class="row">
        <label class="label" for="b" style="min-width:6em;">メイト1</label>
        <input id="b" name="b" class="fld" type="number"
               inputmode="numeric" data-index="1" enterkeyhint="next">
      </div>

      <div class="row">
        <label class="label" for="c" style="min-width:6em;">メイト2</label>
        <input id="c" name="c" class="fld" type="number"
               inputmode="numeric" data-index="2" enterkeyhint="next">
      </div>

      <div class="row">
        <label class="label" for="d" style="min-width:6em;">メイト3</label>
        <input id="d" name="d" class="fld" type="number"
               inputmode="numeric" data-index="3" enterkeyhint="next">
      </div>

      <div class="row">
        <label class="label" for="e" style="min-width:6em;">敵レベル</label>
        <input id="e" name="e" class="fld" type="number"
               inputmode="numeric" data-index="4" enterkeyhint="done">
      </div>

    </form>

    <!-- 結果 -->
    <section class="result-panel" aria-live="polite">
      <div class="row" id="averageResult">メイト平均レベル: -</div>
      <div class="row" id="differenceResult">レベル差: -</div>
      <div class="row total" id="ratioResult">経験値倍率: -</div>
    </section>

    <ul>
      <li><a href="https://uppooooo.github.io/mm/">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const inputs = Array.from(document.querySelectorAll('.fld'))
    .sort((a,b)=>+a.dataset.index-+b.dataset.index);

  const STORAGE_KEY = 'exp-ratio.v1';

  const toNum = v => Number.isFinite(+v) ? +v : NaN;

  function calc(){
    const a = toNum(aInput.value);
    const b = toNum(bInput.value);
    const c = toNum(cInput.value);
    const d = toNum(dInput.value);
    const e = toNum(eInput.value);

    let sum = 0, count = 0;
    if (!isNaN(a)){ sum+=a; count++; }
    if (!isNaN(b) && Math.abs(a-b)<=15){ sum+=b; count++; }
    if (!isNaN(c) && Math.abs(a-c)<=15){ sum+=c; count++; }
    if (!isNaN(d) && Math.abs(a-d)<=15){ sum+=d; count++; }

    if (count===0 || isNaN(e)){
      averageResult.textContent = '条件を満たす値を入力してください。';
      differenceResult.textContent = '';
      ratioResult.textContent = '';
      return;
    }

    const avg = sum / count;
    const diff = e - avg;

    let text='', ratio='';
    if (diff<=-9){ text='灰色'; ratio='12.5%'; }
    else if (diff<=-4){ text='緑色'; ratio='25.0%'; }
    else if (diff<=-1){ text='黄４'; ratio='50.0%'; }
    else if (diff<=2){ text='黄３'; ratio='75.0%'; }
    else if (diff<=4){ text='黄２'; ratio='90.0%'; }
    else if (diff<=7){ text='黄１'; ratio='100.0%'; }
    else if (diff<14){ text='橙色'; ratio='100.0%'; }
    else{ text='赤色'; ratio='100.0%'; }

    averageResult.textContent = `メイト平均レベル: ${avg.toFixed(2)}`;
    differenceResult.textContent = `レベル差: ${diff.toFixed(2)} (${text})`;
    ratioResult.textContent = `経験値倍率: ${ratio}`;
  }

  // DOM参照キャッシュ
  const aInput = document.getElementById('a');
  const bInput = document.getElementById('b');
  const cInput = document.getElementById('c');
  const dInput = document.getElementById('d');
  const eInput = document.getElementById('e');

  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw){
      const data = JSON.parse(raw);
      inputs.forEach(i=>{ if (data[i.name]!=null) i.value=data[i.name]; });
    }
  }catch{}

  inputs.forEach((el,i)=>{
    el.addEventListener('focus',()=>setTimeout(()=>el.select?.(),0));

    el.addEventListener('input',()=>{
      calc();
      const data={};
      inputs.forEach(x=>data[x.name]=x.value);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    });

    el.addEventListener('keydown', e=>{
      if (e.key==='Enter'){
        e.preventDefault();
        inputs[i+1]?.focus();
      }
    });
  });

  calc();
  inputs[0]?.focus();
})();
</script>
</body>
</html>
