<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MIX計算機</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="./styles.css">

  <!-- iPhone 最適化 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
</head>

<body>
  <div class="container">
    <header>
      <h1>MIX計算機</h1>
      <p>※ 半角数字で入力してください（リアルタイム計算）</p>
    </header>

    <main>
      <!-- 見出し行（2列） -->
      <div class="form-grid">
        <div></div>
        <div class="label">現在Lv</div>
        <div class="label">基本Lv</div>
      </div>

      <!-- 入力フォーム（メイン／サブ 各2列） -->
      <form class="form-grid" novalidate>
        <label class="label">メイン</label>
        <input id="A" class="fld" type="number" inputmode="numeric" data-index="0">
        <input id="B" class="fld" type="number" inputmode="numeric" data-index="1">

        <label class="label">サブ</label>
        <input id="C" class="fld" type="number" inputmode="numeric" data-index="2">
        <input id="D" class="fld" type="number" inputmode="numeric" data-index="3">
      </form>

      <!-- 結果 -->
      <section class="result-panel" aria-live="polite">
        <div class="row total">
          完成Lv：<span id="E">-</span>
        </div>
      </section>

      <ul>
        <li><a href="https://uppooooo.github.io/mm/">トップページ</a></li>
      </ul>
    </main>
  </div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll('.fld'));
  const KEY = 'mix-calc.v1';
  const flds = $$('.fld').sort((a,b)=>+a.dataset.index-+b.dataset.index);

  function n(v){
    const x = Number(v);
    return Number.isFinite(x) ? x : NaN;
  }

  function calc(){
    const A = n($('#A').value);
    const B = n($('#B').value);
    const C = n($('#C').value);
    const D = n($('#D').value);

    if ([A,B,C,D].some(isNaN)){
      $('#E').textContent = '-';
      return;
    }

    // 元仕様と完全同一ロジック
    const result =
      Math.floor((A + C) / 2) +
      Math.floor((
        Math.min(Math.floor(A * 100 / (B + 25)) / 10, 10) +
        Math.min(Math.floor(C * 100 / (D + 25)) / 10, 10)
      ) / 2);

    $('#E').textContent = result;
  }

  /* 復元 */
  try{
    const raw = localStorage.getItem(KEY);
    if (raw){
      const d = JSON.parse(raw);
      flds.forEach(f=>{ if(d[f.id]!=null) f.value=d[f.id]; });
    }
  }catch{}

  flds.forEach((el,i)=>{
    /* フォーカス時は常に全選択（iOS対応） */
    el.addEventListener('focus', ()=>{
      setTimeout(()=>el.select(), 0);
    });

    /* 入力時の再計算＋保存 */
    el.addEventListener('input', ()=>{
      calc();
      const d={};
      flds.forEach(x=>d[x.id]=x.value);
      localStorage.setItem(KEY, JSON.stringify(d));
    });

    /* Enter / Shift+Enter の上下移動 */
    el.addEventListener('keydown', e=>{
      if (e.key === 'Enter'){
        e.preventDefault();
        if (e.shiftKey){
          if (flds[i-1]) flds[i-1].focus();
        } else {
          if (flds[i+1]) flds[i+1].focus();
        }
      }
    });
    /* Tab / Shift+Tab は標準動作 */
  });

  calc();
  if (flds[0]) flds[0].focus();
})();
</script>
</body>
</html>
