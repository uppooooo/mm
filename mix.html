<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MIX計算機</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="./styles.css">

  <!-- iPhone 最適化 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
</head>

<body>
<div class="container">
  <header>
    <h1>MIX計算機</h1>
    <p>半角数字で入力してください。</p>
  </header>

  <main>
    <!-- 入力 -->
    <form class="form-grid cols-3" novalidate>

      <!-- ヘッダー -->
      <div></div>
      <div class="label">現在Lv</div>
      <div class="label">基本Lv</div>

      <!-- メイン -->
      <div class="label">メイン</div>
      <input id="A" class="fld" type="number" inputmode="numeric" data-index="0">
      <input id="B" class="fld" type="number" inputmode="numeric" data-index="1">

      <div></div>
      <div id="warn-main" class="label" style="grid-column: 2 / span 2; color:#dc2626;"></div>

      <!-- サブ -->
      <div class="label">サブ</div>
      <input id="C" class="fld" type="number" inputmode="numeric" data-index="2">
      <input id="D" class="fld" type="number" inputmode="numeric" data-index="3">

      <div></div>
      <div id="warn-sub" class="label" style="grid-column: 2 / span 2; color:#dc2626;"></div>

    </form>

    <!-- 結果 -->
    <section class="result-panel" aria-live="polite">
      <div class="row total">
        完成Lv：<span id="E">-</span>
      </div>
    </section>

    <ul>
      <li><a href="./index.html">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const inputs = Array.from(document.querySelectorAll('.fld'))
    .sort((a,b)=>+a.dataset.index-+b.dataset.index);

  const KEY = 'mix-calc.v4';

  const n = v => Number.isFinite(+v) ? +v : NaN;

  function checkWarnings(){
    const A = n($('#A').value);
    const B = n($('#B').value);
    const C = n($('#C').value);
    const D = n($('#D').value);

    // メイン警告
    if (Number.isFinite(A) && Number.isFinite(B) && A < B) {
      $('#warn-main').textContent = '現在レベルが基本レベル未満です。';
    } else {
      $('#warn-main').textContent = '';
    }

    // サブ警告
    if (Number.isFinite(C) && Number.isFinite(D) && C < D) {
      $('#warn-sub').textContent = '現在レベルが基本レベル未満です。';
    } else {
      $('#warn-sub').textContent = '';
    }
  }

  function calc(){
    const A = n($('#A').value);
    const B = n($('#B').value);
    const C = n($('#C').value);
    const D = n($('#D').value);

    checkWarnings();

    if ([A,B,C,D].some(isNaN)){
      $('#E').textContent = '-';
      return;
    }

    const result =
      Math.floor((A + C) / 2) +
      Math.floor((
        Math.min(Math.floor(A * 100 / (B + 25)) / 10, 10) +
        Math.min(Math.floor(C * 100 / (D + 25)) / 10, 10)
      ) / 2);

    $('#E').textContent = result;
  }

  /* 復元 */
  try{
    const raw = localStorage.getItem(KEY);
    if (raw){
      const d = JSON.parse(raw);
      inputs.forEach(f => d[f.id] != null && (f.value = d[f.id]));
    }
  }catch{}

  inputs.forEach((el,i)=>{
    el.addEventListener('focus',()=>setTimeout(()=>el.select(),0));
    el.addEventListener('input',()=>{
      calc();
      const d={};
      inputs.forEach(x=>d[x.id]=x.value);
      localStorage.setItem(KEY,JSON.stringify(d));
    });
    el.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        inputs[i+1]?.focus();
      }
    });
  });

  calc();
  inputs[0]?.focus();
})();
</script>
</body>
</html>
