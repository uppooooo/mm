<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>MIXツリー ─ 半球掲示板</title>
<style>
:root {
  --bg:#d0d8d0;--bg-wrap:#e8f0e8;--bg-section:#f0f4f0;
  --bg-header-from:#b8c8b8;--bg-header-to:#c8d8c8;
  --bg-nav:#c0d0c0;--bg-sh-from:#a0b8a0;--bg-sh-to:#88a088;
  --line-accent:#408040;--line-accent-hi:#70b070;
  --line-border:#a8b8a8;--line-border-light:#b8c8b8;--line-header-border:#90a890;
  --text:#1a2a1a;--text-muted:#708870;--text-heading:#206020;--text-section:#1a401a;
  --text-label:#306030;
  --link:#2244aa;--link-hover:#cc4400;--link-visited:#553388;
  --accent:#408040;
  --btn-from:#408840;--btn-to:#286828;--btn-border:#387838;
  --font-base:0.75rem;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;}
body{background:var(--bg);color:var(--text);font-family:'ＭＳ Ｐゴシック','MS PGothic','ヒラギノ角ゴ Pro',Osaka,sans-serif;font-size:var(--font-base);line-height:1.6;-webkit-text-size-adjust:100%;}
a{color:var(--link);text-decoration:none;}
a:hover,a:focus{color:var(--link-hover);text-decoration:underline;outline:none;}
a:visited{color:var(--link-visited);}
.wrap{max-width:900px;margin:0 auto;background:var(--bg-wrap);border-left:1px solid var(--line-border);border-right:1px solid var(--line-border);}
.gl{height:4px;background:linear-gradient(90deg,var(--line-accent),var(--line-accent-hi),var(--line-accent));}
.gl2{height:1px;background:var(--line-border-light);}
.site-header{background:linear-gradient(180deg,var(--bg-header-from),var(--bg-header-to),var(--bg-header-from));text-align:center;padding:0.875rem 0.625rem 0.625rem;border-bottom:2px solid var(--line-header-border);}
.site-header h1{font-size:1.125rem;color:var(--text-heading);text-shadow:1px 1px 0 rgba(255,255,255,.5);letter-spacing:0.2em;}
.site-header .bl{font-size:0.6875rem;margin-top:0.1875rem;}.site-header .bl a{color:var(--link);}
.site-nav{background:var(--bg-nav);border-bottom:1px solid var(--line-border);text-align:center;padding:0.25rem 0;display:flex;justify-content:center;flex-wrap:wrap;}
.site-nav a{display:inline-block;color:var(--text-heading);font-size:0.6875rem;font-weight:bold;letter-spacing:0.06em;padding:0.3rem 0.875rem;border-right:1px solid var(--line-border);}
.site-nav a:last-child{border-right:none;}
.site-nav a:hover,.site-nav a:focus{color:var(--link-hover);background:rgba(64,128,64,.08);text-decoration:none;}
.content{padding:0.625rem 0.875rem;min-height:31.25rem;}
.sb{border:1px solid var(--line-border);margin-bottom:0.75rem;background:var(--bg-section);}
.sh{background:linear-gradient(180deg,var(--bg-sh-from),var(--bg-sh-to));color:#fff;font-size:0.6875rem;font-weight:bold;letter-spacing:0.15em;padding:0.3rem 0.625rem;border-bottom:1px solid var(--line-header-border);}
.sd{padding:0.5rem 0.625rem;}
.desc{font-size:0.6875rem;color:var(--text-muted);margin-top:0.25rem;}
.btn{padding:0.5rem 1.5rem;font-size:0.75rem;font-weight:bold;color:#fff;background:linear-gradient(180deg,var(--btn-from),var(--btn-to));border:1px solid var(--btn-border);border-radius:3px;cursor:pointer;letter-spacing:0.06em;appearance:none;-webkit-appearance:none;}
.btn:hover{filter:brightness(1.1);}.btn:active{filter:brightness(0.95);}
.btn-sm{padding:0.25rem 0.75rem;font-size:0.6875rem;}
.search-row{display:flex;gap:0.375rem;align-items:center;flex-wrap:wrap;}
.search-row input[type=text]{flex:1;min-width:10rem;padding:0.375rem 0.5rem;font-size:0.8125rem;background:#fff;border:1px solid var(--line-border);color:var(--text);border-radius:2px;font-family:inherit;}
.search-row input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 3px rgba(64,128,64,.3);}
.suggest-list{position:absolute;z-index:100;background:#fff;border:1px solid var(--line-border);border-top:none;max-height:10rem;overflow-y:auto;font-size:0.8125rem;width:100%;}
.suggest-list div{padding:0.3rem 0.5rem;cursor:pointer;}
.suggest-list div:hover,.suggest-list div.sel{background:rgba(64,128,64,.12);}
.suggest-wrap{position:relative;flex:1;min-width:10rem;}
.suggest-wrap input{width:100%;}

/* ===== Tree Nodes ===== */
.tree-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0.25rem 0;}

/* MIXペアブロック：メイン+サブをまとめる枠 */
.mix-pair{border:2px solid #8090a0;border-radius:6px;margin:0.375rem 0;padding:0.25rem;background:#f6f8fa;}
.mix-pair-label{font-size:0.5625rem;color:#607080;font-weight:bold;padding:0 0.25rem 0.125rem;letter-spacing:0.06em;}

.tn{border:1px solid var(--line-border);border-radius:4px;margin:0.2rem 0;background:#fff;transition:box-shadow 0.15s;}
.tn-main{border-left:3px solid #4080c0;background:#f8fbff;}
.tn-sub{border-left:3px solid #c06040;background:#fff8f6;}
.tn-root{border-left:3px solid var(--accent);background:#f4faf4;}

.tn-head{display:flex;align-items:center;gap:0.25rem;padding:0.35rem 0.4rem;flex-wrap:wrap;font-size:var(--font-base);}
.tn-name{font-weight:bold;color:var(--text-heading);min-width:0;word-break:break-word;}
.tn-info{font-size:0.625rem;color:var(--text-muted);}
.tn-lv{font-size:0.6875rem;color:var(--text-label);font-weight:bold;}
.tn-ec{font-size:0.6875rem;color:#885020;font-weight:bold;background:#fff4e0;padding:0.05rem 0.3rem;border-radius:2px;border:1px solid #e0c888;}
.tn-drop{font-size:0.625rem;color:#2060a0;font-weight:bold;}
.tn-calc{font-size:0.6875rem;color:#a04020;font-weight:bold;}
.tn-warn{font-size:0.5625rem;color:#c02020;font-weight:bold;background:#ffe8e8;padding:0.05rem 0.25rem;border-radius:2px;}
.tn-controls{display:flex;gap:0.2rem;align-items:center;margin-left:auto;flex-shrink:0;}
.tn-controls input[type=number]{width:3.2rem;padding:0.15rem 0.25rem;font-size:0.75rem;border:1px solid var(--line-border);border-radius:2px;text-align:center;font-family:inherit;}
.tn-controls input:focus{border-color:var(--accent);outline:none;}
.tn-btn{width:1.5rem;height:1.5rem;border:1px solid var(--line-border);border-radius:2px;background:#f0f0f0;cursor:pointer;font-size:0.625rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;appearance:none;-webkit-appearance:none;color:var(--text);}
.tn-btn:hover{background:#e0e0e0;}.tn-btn:active{background:#d0d0d0;}
.tn-gender{font-size:0.75rem;cursor:pointer;user-select:none;-webkit-user-select:none;min-width:1.2rem;text-align:center;}
.tn-color{width:1.5rem;height:1.5rem;border:1px solid var(--line-border);border-radius:2px;cursor:pointer;flex-shrink:0;}
.color-0{background:#fff;}.color-1{background:#ffd0d0;}.color-2{background:#d0ffd0;}.color-3{background:#d0d0ff;}.color-4{background:#fff0c0;}.color-5{background:#e0d0f0;}
.tn-role{font-size:0.5625rem;font-weight:bold;padding:0.05rem 0.3rem;border-radius:2px;flex-shrink:0;}
.tn-role-main{background:#d0e8ff;color:#2050a0;}
.tn-role-sub{background:#ffe0d0;color:#a04020;}
.tn-switch{font-size:0.5rem;padding:0.1rem 0.3rem;background:linear-gradient(180deg,#888,#666);color:#fff;border:1px solid #777;border-radius:2px;cursor:pointer;flex-shrink:0;}
.tn-switch:hover{filter:brightness(1.2);}
.tn-expand{font-size:0.6875rem;color:var(--accent);cursor:pointer;padding:0.25rem 0.5rem;font-weight:bold;text-align:center;background:#e8f4e8;border:1px dashed var(--accent);border-radius:3px;margin:0.25rem 0.5rem;}
.tn-expand:hover{background:#d8ecd8;}
.tn-leaf{font-size:0.625rem;color:var(--text-muted);font-style:italic;padding:0.25rem 0.5rem;}
.site-footer{background:var(--bg-nav);border-top:2px solid var(--line-header-border);text-align:center;padding:0.625rem;font-size:0.625rem;color:var(--text-muted);}
.site-footer a{color:var(--link);}

@media(max-width:600px){
  :root{--font-base:0.875rem;}
  .wrap{width:100%;border:none;}
  .site-header h1{font-size:1.0625rem;}
  .site-nav a{padding:0.625rem 0.75rem;font-size:0.8125rem;}
  .content{padding:0.5rem;}
  .sh{font-size:0.75rem;padding:0.4375rem 0.625rem;}.sd{padding:0.5rem;}
  .btn{padding:0.75rem 0;width:100%;font-size:0.9375rem;}
  .btn-sm{padding:0.5rem 1rem;width:auto;font-size:0.8125rem;}
  .search-row{flex-direction:column;}.search-row input{font-size:1rem;}
  .tn-head{gap:0.2rem;padding:0.4rem 0.375rem;}
  .tn-name{font-size:0.875rem;}
  .tn-controls input[type=number]{width:3.5rem;font-size:0.875rem;}
  .tn-btn{width:2rem;height:2rem;font-size:0.75rem;}
  .desc{font-size:0.8125rem;}
}
</style>
</head>
<body>
<div class="wrap">
<div class="gl" role="presentation"></div>
<header class="site-header">
  <h1>MIXツリー</h1>
  <p class="bl"><a href="../index.html">≪ メインサイトに戻る</a></p>
</header>
<div class="gl" role="presentation"></div>
<nav class="site-nav" aria-label="メインナビゲーション">
  <a href="../index.html">メインサイト</a>
  <a href="./mix_db.html">ミックス表DB</a>
  <a href="./mix_tree.html">MIXツリー</a>
</nav>
<div class="gl2" role="presentation"></div>
<main class="content">
  <section class="sb">
    <h2 class="sh">MIX TREE ─ ミックスツリーシミュレーター</h2>
    <div class="sd">
      <p class="desc">完成コア名を入力 → ツリー展開。レベル入力で作成Lvを自動計算。ノードの▶で子を展開できます。</p>
      <div class="search-row" style="margin-top:0.5rem;">
        <div class="suggest-wrap">
          <input type="text" id="coreInput" placeholder="完成コア名を入力..." autocomplete="off">
          <div class="suggest-list" id="suggestList" style="display:none;"></div>
        </div>
        <button type="button" class="btn" id="btnBuild">ツリー生成</button>
      </div>
    </div>
  </section>
  <section class="sb" id="treeSection" style="display:none;">
    <h2 class="sh">TREE ─ <span id="treeTitle"></span></h2>
    <div class="sd" id="treeBody"></div>
  </section>
</main>
<div class="gl" role="presentation"></div>
<footer class="site-footer"><a href="../index.html">≪ メインサイトに戻る</a><br>since 2026 ─ 半球掲示板</footer>
<div class="gl" role="presentation"></div>
</div>
<script src="./config.js"></script>
<script src="./mix_data.js"></script>
<script>
(function(){
'use strict';
var MIX_SK='mix_db_entries';
var INIT_DEPTH=1; // 初期展開は1階層まで

function loadMix(){
  // 共有データ（mix_data.js）があればそちらを優先
  if(window.MIX_SHARED_DATA&&Array.isArray(window.MIX_SHARED_DATA)&&window.MIX_SHARED_DATA.length>0){
    return window.MIX_SHARED_DATA;
  }
  // フォールバック：localStorage
  try{var r=localStorage.getItem(MIX_SK);if(r){var d=JSON.parse(r);if(Array.isArray(d))return d;}}catch(e){}
  return[];
}
function findRecipes(name){
  var all=loadMix(),n=name.toLowerCase();
  return all.filter(function(e){return e.core&&e.core.toLowerCase()===n&&(e.main||e.sub);});
}
function findCoreInfo(name){
  var all=loadMix(),n=name.toLowerCase();
  for(var i=0;i<all.length;i++){if(all[i].core&&all[i].core.toLowerCase()===n)return all[i];}
  return null;
}
function allCoreNames(){
  var all=loadMix(),set={},list=[];
  all.forEach(function(e){if(e.core&&!set[e.core]){set[e.core]=1;list.push(e.core);}});
  return list.sort();
}
function calcMixLevel(lvM,baseM,lvS,baseS){
  var avg=Math.floor((lvM+lvS)/2);
  var bm=Math.min(Math.floor(10*lvM/(baseM+25)*10)/10,10);
  var bs=Math.min(Math.floor(10*lvS/(baseS+25)*10)/10,10);
  return avg+Math.floor((bm+bs)/2);
}

// --- サジェスト ---
var inp=document.getElementById('coreInput'),sugEl=document.getElementById('suggestList'),sugIdx=-1;
inp.addEventListener('input',function(){
  var v=this.value.trim().toLowerCase();
  if(!v){sugEl.style.display='none';return;}
  var ns=allCoreNames().filter(function(n){return n.toLowerCase().indexOf(v)>=0;});
  if(!ns.length){sugEl.style.display='none';return;}
  sugEl.innerHTML='';sugIdx=-1;
  ns.slice(0,15).forEach(function(n){var d=document.createElement('div');d.textContent=n;d.onclick=function(){inp.value=n;sugEl.style.display='none';};sugEl.appendChild(d);});
  sugEl.style.display='block';
});
inp.addEventListener('keydown',function(e){
  var items=sugEl.querySelectorAll('div');
  if(!items.length||sugEl.style.display==='none'){if(e.key==='Enter')document.getElementById('btnBuild').click();return;}
  if(e.key==='ArrowDown'){e.preventDefault();sugIdx=Math.min(sugIdx+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();sugIdx=Math.max(sugIdx-1,0);}
  else if(e.key==='Enter'&&sugIdx>=0){e.preventDefault();inp.value=items[sugIdx].textContent;sugEl.style.display='none';return;}
  for(var i=0;i<items.length;i++){items[i].className=i===sugIdx?'sel':'';}
});
document.addEventListener('click',function(e){if(!e.target.closest('.suggest-wrap'))sugEl.style.display='none';});

// --- ツリーデータ構築（遅延展開対応） ---
var nodeId=0;
function makeNode(coreName,role,ec){
  var info=findCoreInfo(coreName);
  var recipes=findRecipes(coreName);
  return {
    id:++nodeId, name:coreName, role:role||'', ec:ec||'',
    baseLv:info?info.baseLv:0, race:info?info.race:'', drop:info?!!info.drop:false,
    recipes:recipes, recipeIdx:0,
    currentLv:info?info.baseLv:0, targetLv:info?info.baseLv:0, gender:'', colorIdx:0,
    collapsed:false, expanded:false, children:[]
  };
}

function expandNode(node,depth,maxDepth){
  if(node.expanded)return;
  var r=node.recipes[node.recipeIdx];
  if(!r){node.expanded=true;return;}
  node.children=[];
  var mc=makeNode(r.main,'main',r.mainEC);
  var sc=makeNode(r.sub,'sub',r.subEC);
  node.children=[mc,sc];
  node.expanded=true;
  // 再帰展開（maxDepthまで）
  if(depth<maxDepth){
    if(mc.recipes.length>0)expandNode(mc,depth+1,maxDepth);
    if(sc.recipes.length>0)expandNode(sc,depth+1,maxDepth);
  }
}

function switchRecipe(node){
  var next=(node.recipeIdx+1)%node.recipes.length;
  node.recipeIdx=next;
  node.expanded=false;node.children=[];
  expandNode(node,0,0);
  recalcTree(rootNode);
  renderTree();
}

function lazyExpand(node){
  if(!node.expanded&&node.recipes.length>0){
    expandNode(node,0,0); // depth=0, maxDepth=0 → このノードの子だけ
  }
  node.collapsed=false;
  recalcTree(rootNode);
  renderTree();
}

// --- レベル再計算 ---
function recalcTree(node){
  if(node.children.length===2){
    recalcTree(node.children[0]);recalcTree(node.children[1]);
    var m=node.children[0],s=node.children[1];
    node.calcLv=calcMixLevel(m.currentLv,m.baseLv,s.currentLv,s.baseLv);
  }else{node.calcLv=undefined;}
}

// --- レンダリング ---
var COLORS=['color-0','color-1','color-2','color-3','color-4','color-5'];

function renderNode(node){
  var cls='tn';
  if(node.role==='main')cls+=' tn-main';
  else if(node.role==='sub')cls+=' tn-sub';
  else cls+=' tn-root';

  var div=document.createElement('div');div.className=cls;div.id='tn-'+node.id;
  var head=document.createElement('div');head.className='tn-head';

  // 折りたたみ/展開ボタン
  var hasKids=node.children.length>0;
  var canExpand=!node.expanded&&node.recipes.length>0;
  if(hasKids||canExpand){
    var tog=document.createElement('button');tog.className='tn-btn';
    tog.textContent=node.collapsed?'▶':(hasKids?'▼':'▶');
    tog.onclick=function(){
      if(!node.expanded&&node.recipes.length>0){lazyExpand(node);return;}
      node.collapsed=!node.collapsed;
      renderTree();
    };
    head.appendChild(tog);
  }

  // ロール
  if(node.role){
    var rs=document.createElement('span');
    rs.className='tn-role '+(node.role==='main'?'tn-role-main':'tn-role-sub');
    rs.textContent=node.role==='main'?'メイン':'サブ';
    head.appendChild(rs);
  }

  // コア名
  var ns=document.createElement('span');ns.className='tn-name';ns.textContent=node.name;head.appendChild(ns);

  // 種族
  if(node.race){var ri=document.createElement('span');ri.className='tn-info';ri.textContent='['+node.race+']';head.appendChild(ri);}

  // 基本Lv
  var bl=document.createElement('span');bl.className='tn-lv';bl.textContent='基本:'+node.baseLv;head.appendChild(bl);

  // EC（復活）
  if(node.ec){var ec=document.createElement('span');ec.className='tn-ec';ec.textContent='EC:'+node.ec;head.appendChild(ec);}

  // ドロップ
  if(node.drop){var dp=document.createElement('span');dp.className='tn-drop';dp.textContent='Drop可';head.appendChild(dp);}

  // 計算結果
  var isRoot=!node.role;
  if(node.calcLv!==undefined){
    var cl=document.createElement('span');cl.className='tn-calc';cl.id='calc-'+node.id;
    if(isRoot&&node.targetLv){
      var ok=node.calcLv>=node.targetLv;
      cl.textContent='→作成:'+node.calcLv+(ok?' ✓達成':' ✗不足(希望:'+node.targetLv+')');
      cl.style.color=ok?'#208020':'#c02020';
    }else{
      cl.textContent='→作成:'+node.calcLv;
    }
    head.appendChild(cl);
  }

  // コントロール群
  var ctrl=document.createElement('div');ctrl.className='tn-controls';

  // ルート：完成希望Lv / 子：現在Lv
  if(isRoot){
    var lvLabel=document.createElement('span');lvLabel.className='tn-info';lvLabel.style.fontWeight='bold';lvLabel.textContent='希望Lv:';
    ctrl.appendChild(lvLabel);
  }
  var lvInp=document.createElement('input');lvInp.type='number';lvInp.min='1';lvInp.max='999';
  lvInp.value=isRoot?(node.targetLv||node.baseLv):node.currentLv;
  lvInp.title=isRoot?'完成希望Lv':'現在Lv';
  lvInp.onfocus=function(){var self=this;setTimeout(function(){self.select();},0);};
  lvInp.oninput=function(){
    var v=parseInt(this.value)||0;
    if(isRoot){node.targetLv=v;}else{node.currentLv=v;}
    recalcAndUpdate();
    if(!isRoot){
      updateWarnStyle(this,node);
      var wEl=document.getElementById('warn-'+node.id);
      var wt=getWarnText(node);
      if(wt){
        if(!wEl){wEl=document.createElement('span');wEl.className='tn-warn';wEl.id='warn-'+node.id;this.parentNode.insertBefore(wEl,this.nextSibling);}
        wEl.textContent=wt;
      }else if(wEl){wEl.remove();}
    }
  };
  if(!isRoot)updateWarnStyle(lvInp,node);
  ctrl.appendChild(lvInp);

  // 警告ラベル（ルート以外）
  if(!isRoot){
    var initWarn=getWarnText(node);
    if(initWarn){
      var wn=document.createElement('span');wn.className='tn-warn';wn.textContent=initWarn;wn.id='warn-'+node.id;
      ctrl.appendChild(wn);
    }
  }

  // 性別
  var gs=document.createElement('span');gs.className='tn-gender';gs.textContent=node.gender||'−';gs.title='性別';
  gs.onclick=function(){
    if(!node.gender)node.gender='♂';else if(node.gender==='♂')node.gender='♀';else node.gender='';
    gs.textContent=node.gender||'−';
  };
  ctrl.appendChild(gs);

  // 色
  var cb=document.createElement('div');cb.className='tn-color '+COLORS[node.colorIdx];cb.title='色切替';
  cb.onclick=function(){node.colorIdx=(node.colorIdx+1)%COLORS.length;cb.className='tn-color '+COLORS[node.colorIdx];};
  ctrl.appendChild(cb);

  // パターン切替
  if(node.recipes.length>1){
    var sw=document.createElement('button');sw.className='tn-switch';
    sw.textContent='切替('+(node.recipeIdx+1)+'/'+node.recipes.length+')';
    sw.onclick=function(){switchRecipe(node);};
    ctrl.appendChild(sw);
  }

  head.appendChild(ctrl);
  div.appendChild(head);

  // 子ノード（ペアブロックで囲む）
  if(node.children.length===2&&!node.collapsed){
    var pair=document.createElement('div');pair.className='mix-pair';
    var pLabel=document.createElement('div');pLabel.className='mix-pair-label';pLabel.textContent='MIX素材';
    pair.appendChild(pLabel);
    pair.appendChild(renderNode(node.children[0]));
    pair.appendChild(renderNode(node.children[1]));
    div.appendChild(pair);
  }else if(node.children.length===0&&node.recipes.length===0&&node.expanded){
    var leaf=document.createElement('div');leaf.className='tn-leaf';
    leaf.textContent=node.drop?'🎯 ドロップで入手':'※ レシピ未登録';
    div.appendChild(leaf);
  }

  return div;
}

function updateWarnStyle(inp,node){
  if(node.baseLv>0&&node.currentLv<node.baseLv){inp.style.borderColor='#c02020';inp.style.background='#fff0f0';}
  else if(node.baseLv>0&&node.currentLv>=node.baseLv+26){inp.style.borderColor='#c08000';inp.style.background='#fff8e0';}
  else{inp.style.borderColor='';inp.style.background='';}
}
function getWarnText(node){
  if(node.baseLv>0&&node.currentLv<node.baseLv)return '⚠Lv不足';
  if(node.baseLv>0&&node.currentLv>=node.baseLv+26)return '⚠限界超過';
  return '';
}

var rootNode=null;

function recalcAndUpdate(){
  if(!rootNode)return;
  recalcTree(rootNode);
  updateCalcLabels(rootNode);
}
function updateCalcLabels(node){
  if(node.calcLv!==undefined){
    var el=document.getElementById('calc-'+node.id);
    if(el){
      if(!node.role&&node.targetLv){
        var ok=node.calcLv>=node.targetLv;
        el.textContent='→作成:'+node.calcLv+(ok?' ✓達成':' ✗不足(希望:'+node.targetLv+')');
        el.style.color=ok?'#208020':'#c02020';
      }else{
        el.textContent='→作成:'+node.calcLv;el.style.color='#a04020';
      }
    }
  }
  node.children.forEach(updateCalcLabels);
}

function renderTree(){
  var body=document.getElementById('treeBody');body.innerHTML='';
  if(!rootNode)return;
  recalcTree(rootNode);
  var wrap=document.createElement('div');wrap.className='tree-wrap';
  wrap.appendChild(renderNode(rootNode));
  body.appendChild(wrap);
}

// --- ビルド ---
document.getElementById('btnBuild').addEventListener('click',function(){
  var name=inp.value.trim();
  if(!name){alert('コア名を入力してください。');return;}
  var info=findCoreInfo(name);
  if(!info){alert('「'+name+'」はミックス表DBに登録されていません。');return;}
  nodeId=0;
  rootNode=makeNode(name,'','');
  // 初期はルートだけ表示（展開しない）
  document.getElementById('treeSection').style.display='block';
  document.getElementById('treeTitle').textContent=name+' のミックスツリー';
  renderTree();
});

})();
</script>
