<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雑談BBS ─ みんなの掲示板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#d8e8d0;color:#2a3a20;
  font-family:'ＭＳ Ｐゴシック','MS PGothic','ヒラギノ角ゴ Pro',Osaka,sans-serif;
  font-size:12px;line-height:1.6;-webkit-text-size-adjust:100%;
}
a{color:#2244aa;text-decoration:none;}a:hover{color:#cc4400;text-decoration:underline;}a:visited{color:#553388;}
.wrap{max-width:760px;margin:0 auto;background:#f0f5e8;border-left:1px solid #b8c8a8;border-right:1px solid #b8c8a8;}
.gl{height:4px;background:linear-gradient(90deg,#6a9a50,#88bb68,#a0cc80,#88bb68,#6a9a50);}
.gl2{height:1px;background:#c0d0b0;}

.hd{background:linear-gradient(180deg,#c8d8b8,#d8e8c8,#c8d8b8);text-align:center;padding:14px 10px 10px;border-bottom:2px solid #a0b888;}
.hd h1{font-size:18px;color:#3a6a20;text-shadow:1px 1px 0 rgba(255,255,255,.5);letter-spacing:3px;}
.hd .bl{font-size:11px;margin-top:3px;}

.nv{background:#d0e0c0;border-bottom:1px solid #b8c8a8;text-align:center;padding:4px 0;display:flex;justify-content:center;flex-wrap:wrap;}
.nv a{display:inline-block;color:#3a5a20;font-size:11px;font-weight:bold;letter-spacing:1px;padding:5px 14px;border-right:1px solid #b8c8a8;}
.nv a:last-child{border-right:none;}
.nv a:hover{color:#cc4400;background:rgba(100,160,80,.1);text-decoration:none;}

.ct{padding:10px 14px;min-height:500px;}

.sb{border:1px solid #b8c8a8;margin-bottom:12px;background:#f8faf0;}
.sh{background:linear-gradient(180deg,#c0d0a8,#a8c090);color:#2a4a18;font-size:11px;font-weight:bold;letter-spacing:2px;padding:5px 10px;border-bottom:1px solid #98b080;}
.sd{padding:8px 10px;}

/* 投稿フォーム */
.pf .fr{display:flex;align-items:center;margin-bottom:7px;gap:6px;}
.pf .fr label{width:70px;font-size:11px;font-weight:bold;color:#4a6a30;text-align:right;flex-shrink:0;}
.pf .fr input[type=text],.pf .fr input[type=password]{
  flex:1;padding:6px 8px;font-size:13px;background:#fff;border:1px solid #b8c8a8;color:#2a3a20;border-radius:2px;font-family:inherit;
}
.pf .fr input:focus,.pf textarea:focus{border-color:#6a9a50;outline:none;box-shadow:0 0 3px rgba(106,154,80,.3);}
.pf textarea{width:100%;height:90px;padding:6px 8px;font-size:13px;background:#fff;border:1px solid #b8c8a8;color:#2a3a20;border-radius:2px;font-family:inherit;resize:vertical;}
.pf .fa{text-align:center;margin-top:6px;}
.btn{padding:8px 30px;font-size:13px;font-weight:bold;color:#fff;background:linear-gradient(180deg,#5a9a40,#3a7a28);border:1px solid #4a8a38;border-radius:3px;cursor:pointer;letter-spacing:1px;appearance:none;-webkit-appearance:none;}
.btn:hover{background:linear-gradient(180deg,#6aaa50,#4a8a38);}
.btn:active{background:#3a7a28;}

/* トピック一覧 */
.tp{border-bottom:1px solid #d8e8c8;padding:0;margin:0;}
.tp:last-child{border-bottom:none;}
.tp-head{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;padding:7px 4px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.tp-head:hover{background:rgba(100,160,80,.06);}
.tp .no{color:#8a9a78;font-size:11px;min-width:24px;text-align:right;flex-shrink:0;}
.tp .su{font-size:12px;font-weight:bold;color:#2244aa;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tp .nm{font-size:11px;color:#4a8a30;flex-shrink:0;}
.tp .da{font-size:10px;color:#8a9a78;flex-shrink:0;}
.tp .tog{font-size:10px;color:#8a9a78;flex-shrink:0;margin-left:2px;}
.tp-body{font-size:12px;color:#4a4a3a;padding:4px 8px 10px 32px;white-space:pre-wrap;word-break:break-word;display:none;background:#f4f8ec;border-top:1px dotted #c8d8b8;}
.tp-body.open{display:block;}

.ft{background:#d0e0c0;border-top:2px solid #a0b888;text-align:center;padding:10px;font-size:10px;color:#6a7a58;}

/* ===== モバイル ===== */
@media(max-width:600px){
  body{font-size:15px;}
  .wrap{width:100%;border:none;}
  .hd h1{font-size:17px;}
  .nv a{padding:10px 12px;font-size:13px;}
  .ct{padding:8px 8px;}
  .sh{font-size:12px;padding:7px 10px;}
  .sd{padding:8px;}
  .pf .fr{flex-wrap:wrap;}
  .pf .fr label{width:100%;text-align:left;margin-bottom:2px;}
  .pf .fr input[type=text],.pf .fr input[type=password]{width:100%;font-size:16px;}
  .pf textarea{font-size:16px;height:100px;}
  .btn{padding:12px 0;width:100%;font-size:15px;}
  .tp-head{gap:4px;padding:10px 4px;}
  .tp .su{white-space:normal;font-size:14px;}
  .tp .nm{font-size:12px;}
  .tp .da{font-size:11px;width:100%;padding-left:30px;}
  .tp-body{font-size:14px;padding:6px 8px 12px 12px;}
}
</style>
</head>
<body>
<div class="wrap">
<div class="gl"></div>
<div class="hd">
  <h1>雑談BBS</h1>
  <div class="bl"><a href="index.html">≪ トップページに戻る</a></div>
</div>
<div class="gl"></div>
<div class="nv">
  <a href="index.html">TOP</a>
  <a href="chat_bbs.html">雑談BBS</a>
  <a href="hankyu_bbs.html">半球の扉BBS</a>
</div>
<div class="gl2"></div>

<div class="ct">

  <div class="sb">
    <div class="sh">NEW TOPIC ─ 新規投稿</div>
    <div class="sd">
      <div class="pf">
        <div class="fr"><label>名前：</label><input type="text" id="pName" placeholder="名無しさん" maxlength="30"></div>
        <div class="fr"><label>件名：</label><input type="text" id="pSubj" placeholder="トピックの件名" maxlength="80"></div>
        <div class="fr" style="align-items:flex-start;"><label style="margin-top:6px;">本文：</label><textarea id="pBody" placeholder="本文を入力してください"></textarea></div>
        <div class="fr"><label>削除キー：</label><input type="password" id="pDel" placeholder="半角英数8文字以内" maxlength="8" style="max-width:200px;"></div>
        <div class="fa"><button class="btn" onclick="addTopic()">書き込む</button></div>
      </div>
    </div>
  </div>

  <div class="sb">
    <div class="sh">TOPICS ─ トピック一覧　<span id="topicCount" style="font-weight:normal;color:#6a8a50;"></span></div>
    <div class="sd" id="topicList"></div>
  </div>

</div>

<div class="gl"></div>
<div class="ft"><a href="index.html">≪ トップページに戻る</a><br>since 2026 ─ みんなの掲示板</div>
<div class="gl"></div>
</div>

<script>
const SK='chat_bbs_topics';
function load(){const d=localStorage.getItem(SK);if(d)return JSON.parse(d);return[
{name:'管理人',subj:'はじめまして！自己紹介トピック',body:'みなさんはじめまして！\nここで自己紹介をどうぞ。よろしくお願いします。',date:'2026/04/17 12:00'},
{name:'ゲスト',subj:'雑談なんでもトピック',body:'何でも自由に書き込んでください。\n今日はいい天気ですね。',date:'2026/04/17 12:30'},
{name:'名無しさん',subj:'おすすめ情報共有',body:'おすすめの情報があったらここに書き込みましょう！',date:'2026/04/17 13:00'},
];}
function save(d){localStorage.setItem(SK,JSON.stringify(d));}
function now(){const d=new Date(),p=n=>String(n).padStart(2,'0');return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());}
function esc(s){const d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}

function toggleTopic(id){
  const el=document.getElementById('tb-'+id);
  const tg=document.getElementById('tg-'+id);
  if(el.classList.contains('open')){
    el.classList.remove('open');
    tg.textContent='[+]';
  }else{
    el.classList.add('open');
    tg.textContent='[-]';
  }
}

function render(){
  const topics=load();
  const el=document.getElementById('topicList');
  document.getElementById('topicCount').textContent='('+topics.length+'件)';
  if(topics.length===0){el.innerHTML='<p style="color:#8a9a78;text-align:center;padding:20px;">まだ投稿がありません。</p>';return;}
  let h='';
  topics.forEach(function(t,i){
    const num=topics.length-i;
    h+='<div class="tp">';
    h+='<div class="tp-head" onclick="toggleTopic('+i+')">';
    h+='<span class="no">'+num+'</span>';
    h+='<span class="su">'+esc(t.subj)+'</span>';
    h+='<span class="nm">'+esc(t.name)+'</span>';
    h+='<span class="da">'+esc(t.date)+'</span>';
    h+='<span class="tog" id="tg-'+i+'">[+]</span>';
    h+='</div>';
    h+='<div class="tp-body" id="tb-'+i+'">'+esc(t.body).replace(/\n/g,'<br>')+'</div>';
    h+='</div>';
  });
  el.innerHTML=h;
}

function addTopic(){
  const name=document.getElementById('pName').value.trim()||'名無しさん';
  const subj=document.getElementById('pSubj').value.trim();
  const body=document.getElementById('pBody').value.trim();
  if(!subj){alert('件名を入力してください。');return;}
  if(!body){alert('本文を入力してください。');return;}
  const topics=load();
  topics.unshift({name:name,subj:subj,body:body,date:now()});
  save(topics);
  document.getElementById('pSubj').value='';
  document.getElementById('pBody').value='';
  render();
  // 新しいトピックを自動で開く
  toggleTopic(0);
  document.getElementById('topicList').scrollIntoView({behavior:'smooth'});
}

render();
</script>
</body>
</html>
