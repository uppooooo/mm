<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>☆みんなの掲示板☆</title>
<script src="config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#e8d8c4;
  color:#3a2a1a;
  font-family:'ＭＳ Ｐゴシック','MS PGothic','ヒラギノ角ゴ Pro',Osaka,sans-serif;
  font-size:12px;line-height:1.6;-webkit-text-size-adjust:100%;
}
a{color:#2244aa;text-decoration:none;}
a:hover{color:#cc4400;text-decoration:underline;}
a:visited{color:#553388;}

.wrap{max-width:760px;margin:0 auto;background:#f5ead8;border-left:1px solid #c8b8a0;border-right:1px solid #c8b8a0;}

/* 金ライン（装飾） */
.gl{height:4px;background:linear-gradient(90deg,#c8a860,#e8c870,#f0d888,#e8c870,#c8a860);}
.gl2{height:1px;background:#d0c0a0;}

/* ヘッダー */
.hd{background:linear-gradient(180deg,#d8c8a8,#e8d8c0,#d8c8a8);text-align:center;padding:14px 10px 10px;border-bottom:2px solid #c0a878;}
.hd h1{font-size:18px;color:#6a4a20;text-shadow:1px 1px 0 rgba(255,255,255,.5);letter-spacing:3px;}
.hd .sub{font-size:10px;color:#8a7a60;letter-spacing:2px;margin-top:2px;}

/* ナビ */
.nv{background:#ddd0b8;border-bottom:1px solid #c8b898;text-align:center;padding:4px 0;display:flex;justify-content:center;flex-wrap:wrap;}
.nv a{display:inline-block;color:#5a3a10;font-size:11px;font-weight:bold;letter-spacing:1px;padding:5px 14px;border-right:1px solid #c8b898;}
.nv a:last-child{border-right:none;}
.nv a:hover{color:#cc4400;background:rgba(200,168,96,.15);text-decoration:none;}

/* 2カラム */
.main{display:flex;min-height:400px;}
.side{width:155px;min-width:140px;background:#efe0c8;border-right:1px solid #d0c0a0;padding:8px 6px;flex-shrink:0;}
.side .mt{color:#6a4a20;font-size:10px;font-weight:bold;letter-spacing:2px;text-align:center;padding:5px 0;border-bottom:1px solid #d0c0a0;margin-bottom:6px;}
.side ul{list-style:none;}
.side li a{display:block;padding:4px 6px;font-size:11px;color:#5a4a30;border-left:2px solid transparent;}
.side li a:hover{color:#cc4400;border-left-color:#c8a860;background:rgba(200,168,96,.1);text-decoration:none;}
.side .vc{text-align:center;font-size:10px;color:#8a7a60;margin-top:14px;padding-top:10px;border-top:1px solid #d0c0a0;}
.side .vc .n{font-family:'Courier New',monospace;color:#2a6a2a;font-size:12px;font-weight:bold;display:block;margin-top:2px;}

.ct{flex:1;padding:10px 14px;min-width:0;}

/* セクション */
.sb{border:1px solid #c8b898;margin-bottom:12px;background:#faf4e8;}
.sh{background:linear-gradient(180deg,#d8c8a0,#c8b888);color:#4a3a18;font-size:11px;font-weight:bold;letter-spacing:2px;padding:5px 10px;border-bottom:1px solid #b8a878;}
.sd{padding:8px 10px;font-size:12px;}

/* BBSカード */
.bc{display:flex;align-items:center;padding:8px 0;border-bottom:1px dotted #d0c0a0;gap:10px;}
.bc:last-child{border-bottom:none;}
.bc .ic{width:34px;height:34px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:bold;color:#fff;text-shadow:1px 1px 1px rgba(0,0,0,.3);flex-shrink:0;}
.bc .ic.c1{background:linear-gradient(135deg,#4a8a4a,#6aaa6a);}
.bc .ic.c2{background:linear-gradient(135deg,#aa4040,#cc6060);}
.bc h3{font-size:12px;margin-bottom:1px;}
.bc h3 a{color:#2244aa;}
.bc p{font-size:10px;color:#7a6a50;}

/* お知らせ */
.il{max-height:160px;overflow-y:auto;font-size:11px;}
.il::-webkit-scrollbar{width:5px;}
.il::-webkit-scrollbar-track{background:#f0e8d8;}
.il::-webkit-scrollbar-thumb{background:#c8b898;border-radius:3px;}
.ii{padding:3px 0;border-bottom:1px dotted #e0d0b8;}
.ii .dt{color:#8a6a30;font-weight:bold;margin-right:4px;}

/* 注意 */
.nt{background:#fff8e8;border:1px solid #e0c888;border-radius:2px;padding:6px 10px;font-size:11px;color:#6a4a20;line-height:1.7;}

/* フッター */
.ft{background:#ddd0b8;border-top:2px solid #c0a878;text-align:center;padding:10px;font-size:10px;color:#8a7a60;}

/* ===== モバイル ===== */
@media(max-width:600px){
  body{font-size:14px;}
  .wrap{width:100%;border:none;}
  .main{flex-direction:column;}
  .side{width:100%;border-right:none;border-bottom:1px solid #d0c0a0;padding:6px 10px;display:flex;flex-wrap:wrap;align-items:center;}
  .side .mt{width:100%;margin-bottom:4px;}
  .side ul{display:flex;flex-wrap:wrap;width:100%;}
  .side li{flex:1;min-width:0;}
  .side li a{text-align:center;padding:8px 4px;font-size:13px;border-left:none;border-bottom:2px solid transparent;}
  .side li a:hover{border-bottom-color:#c8a860;}
  .side .vc{display:none;}
  .ct{padding:8px 10px;}
  .nv a{padding:10px 12px;font-size:13px;}
  .hd h1{font-size:17px;}
  .sh{font-size:12px;padding:7px 10px;}
  .sd{padding:8px;}
  .bc .ic{width:40px;height:40px;font-size:18px;}
  .bc h3{font-size:14px;}
  .bc p{font-size:12px;}
  .ii{font-size:13px;padding:5px 0;}
  .nt{font-size:13px;}
}
</style>
</head>
<body>
<div class="wrap">
<div class="gl"></div>

<div class="hd">
  <h1 id="siteTitle"></h1>
  <div class="sub" id="siteSub"></div>
</div>

<div class="gl"></div>

<div class="nv">
  <a href="index.html">TOP</a>
  <a href="chat_bbs.html">雑談BBS</a>
  <a href="hankyu_bbs.html">半球の扉BBS</a>
</div>

<div class="gl2"></div>

<div class="main">
<div class="side">
  <div class="mt">MENU</div>
  <ul>
    <li><a href="index.html">■ TOP</a></li>
    <li><a href="chat_bbs.html">■ 雑談BBS</a></li>
    <li><a href="hankyu_bbs.html">■ 半球の扉</a></li>
  </ul>
  <div class="vc">VISITOR<span class="n">000,128</span></div>
</div>

<div class="ct">

  <div class="sb">
    <div class="sh">MAIN MENU ─ BBS一覧</div>
    <div class="sd">
      <div class="bc">
        <div class="ic c1">雑</div>
        <div>
          <h3><a href="chat_bbs.html">雑談BBS</a></h3>
          <p id="chatDesc"></p>
        </div>
      </div>
      <div class="bc">
        <div class="ic c2">半</div>
        <div>
          <h3><a href="hankyu_bbs.html">半球の扉BBS</a></h3>
          <p id="hankyuDesc"></p>
        </div>
      </div>
    </div>
  </div>

  <div class="sb">
    <div class="sh">INFORMATION ─ お知らせ</div>
    <div class="sd"><div class="il" id="infoList"></div></div>
  </div>

  <div class="sb" id="about">
    <div class="sh">ABOUT ─ この掲示板について</div>
    <div class="sd" id="aboutBody"></div>
  </div>

  <div class="sb" id="rules">
    <div class="sh">RULES ─ 利用規約</div>
    <div class="sd"><div class="nt" id="rulesBody"></div></div>
  </div>

</div>
</div>

<div class="gl"></div>
<div class="ft">since 2026 ─ みんなの掲示板</div>
<div class="gl"></div>
</div>

<script>
// config.js から読み込んだ SITE_CONFIG を反映
(function(){
  const C = (typeof SITE_CONFIG !== 'undefined') ? SITE_CONFIG : {};

  document.getElementById('siteTitle').textContent = C.siteName || '☆ みんなの掲示板 ☆';
  document.getElementById('siteSub').textContent = C.siteSubtitle || '';

  // INFORMATION
  const il = document.getElementById('infoList');
  (C.information || []).forEach(function(item){
    const d = document.createElement('div');
    d.className = 'ii';
    d.innerHTML = '<span class="dt">' + item.date + '</span>' + item.text;
    il.appendChild(d);
  });

  // ABOUT
  document.getElementById('aboutBody').innerHTML = '<p>' + (C.about || '').replace(/\n/g, '<br>') + '</p>';

  // RULES
  const rb = document.getElementById('rulesBody');
  (C.rules || []).forEach(function(r){
    rb.innerHTML += '■ ' + r + '<br>';
  });

  // BBS説明
  document.getElementById('chatDesc').textContent = C.chatBbsDesc || '';
  document.getElementById('hankyuDesc').textContent = C.hankyuBbsDesc || '';
})();
</script>
</body>
</html>
