<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ステータス計算</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="./styles.css">

  <!-- iPhone 表示最適化 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
</head>

<body>
  <div class="container">
    <header>
      <h1>ステータス計算</h1>
      <p>※ 半角数字で入力してください（リアルタイム計算）</p>
    </header>

    <main>
      <!-- 入力フォーム（縦並び：1項目＝1行） -->
      <form class="form-grid cols-1" novalidate>
        <label class="label" for="level">レベル</label>
        <input
          id="level"
          class="fld"
          type="number"
          step="1"
          max="9999"
          inputmode="numeric"
          data-index="0"
        >

        <label class="label" for="power">強度</label>
        <input
          id="power"
          class="fld"
          type="number"
          step="0.01"
          max="9999"
          inputmode="decimal"
          data-index="1"
        >
      </form>

      <!-- 結果表示 -->
      <section class="result-panel" aria-live="polite">
        <div class="row">力：<span id="str">-</span></div>
        <div class="row">敏捷：<span id="agi">-</span></div>
        <div class="row">器用：<span id="dex">-</span></div>
        <div class="row">幸運：<span id="luk">-</span></div>
      </section>

      <ul>
        <li><a href="./index.html">トップページ</a></li>
      </ul>
    </main>
  </div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll('.fld'));
  const KEY = 'status-calc.v1';
  const flds = $$('.fld').sort((a,b)=>+a.dataset.index - +b.dataset.index);

  function num(v){
    const n = Number(v);
    return Number.isFinite(n) ? n : NaN;
  }

  function calc(){
    const B3 = num($('#level').value);
    const C3 = num($('#power').value);

    if (isNaN(B3) || isNaN(C3)){
      $('#str').textContent = '-';
      $('#agi').textContent = '-';
      $('#dex').textContent = '-';
      $('#luk').textContent = '-';
      return;
    }

    // 元仕様と完全同一の計算式
    const str = Math.round((B3 + 1) * C3);
    const agi = Math.round(Math.round(B3 / 2) * C3 + B3);
    const dex = Math.round(Math.floor(B3 * 1.5 + 2) * C3);
    const luk = Math.round((B3 + 1) * C3);

    $('#str').textContent = str.toLocaleString();
    $('#agi').textContent = agi.toLocaleString();
    $('#dex').textContent = dex.toLocaleString();
    $('#luk').textContent = luk.toLocaleString();
  }

  /* 前回入力の復元 */
  try{
    const saved = localStorage.getItem(KEY);
    if (saved){
      const d = JSON.parse(saved);
      flds.forEach(f=>{
        if (d[f.id] != null) f.value = d[f.id];
      });
    }
  }catch(e){}

  /* 入力制御（全選択 + Enter / Shift+Enter） */
  flds.forEach((el,i)=>{
    // フォーカス時は必ず全選択（iOS対策）
    el.addEventListener('focus', ()=>{
      setTimeout(()=>el.select(), 0);
    });

    // 入力時：再計算＋保存
    el.addEventListener('input', ()=>{
      calc();
      const d = {};
      flds.forEach(x=>d[x.id]=x.value);
      localStorage.setItem(KEY, JSON.stringify(d));
    });

    // Enter / Shift+Enter で上下移動
    el.addEventListener('keydown', e=>{
      if (e.key === 'Enter'){
        e.preventDefault();
        if (e.shiftKey){
          if (flds[i-1]) flds[i-1].focus();
        } else {
          if (flds[i+1]) flds[i+1].focus();
        }
      }
      // Tab / Shift+Tab はブラウザ標準
    });
  });

  calc();
  if (flds[0]) flds[0].focus();
})();
</script>
</body>
</html>
