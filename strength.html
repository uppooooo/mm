<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>強度計算</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="./styles.css">

  <!-- iPhone 表示最適化 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
</head>

<body>
  <div class="container">
    <header>
      <h1>強度計算</h1>
      <p>※ 半角数字で入力してください（リアルタイム計算）</p>
    </header>

    <main>
      <!-- 入力フォーム（縦並び：1項目＝1行） -->
      <form class="form-grid cols-2" novalidate>
        <label class="label" for="level">レベル</label>
        <input
          id="level"
          class="fld"
          type="number"
          min="0"
          max="999"
          inputmode="numeric"
          data-index="0"
        >

        <label class="label" for="power">力</label>
        <input
          id="power"
          class="fld"
          type="number"
          inputmode="numeric"
          data-index="1"
        >

        <label class="label" for="luck">幸運</label>
        <input
          id="luck"
          class="fld"
          type="number"
          inputmode="numeric"
          data-index="2"
        >

        <label class="label" for="trait">特性</label>
        <select
          id="trait"
          class="fld"
          data-index="3"
        >
          <option value="other">力以外</option>
          <option value="power">力</option>
        </select>
      </form>

      <!-- 結果表示 -->
      <section class="result-panel" aria-live="polite">
        <div class="row total">
          強度：<span id="strength">0.00</span>
        </div>
      </section>

      <ul>
        <li><a href="./index.html">トップページ</a></li>
      </ul>
    </main>
  </div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll('.fld'));
  const KEY = 'strength-trait.v1';
  const flds = $$('.fld').sort((a,b)=> +a.dataset.index - +b.dataset.index);

  function num(v){
    const n = Number(v);
    return Number.isFinite(n) ? n : NaN;
  }

  function calc(){
    const level = num($('#level').value);
    const power = num($('#power').value);
    const luck  = num($('#luck').value);
    const trait = $('#trait').value;

    if (isNaN(level)){
      $('#strength').textContent = '0.00';
      return;
    }

    let strength;
    // 元仕様と完全一致
    if (trait === 'power'){
      strength = luck / (1 + level);
    } else {
      strength = power / (1 + level);
    }

    $('#strength').textContent =
      Number.isFinite(strength) ? strength.toFixed(2) : '0.00';
  }

  /* 前回入力の復元 */
  try{
    const saved = localStorage.getItem(KEY);
    if (saved){
      const d = JSON.parse(saved);
      flds.forEach(f=>{
        if (d[f.id] != null) f.value = d[f.id];
      });
    }
  }catch(e){}

  /* 入力制御（全選択 + Enter / Shift+Enter） */
  flds.forEach((el,i)=>{
    // フォーカス時は必ず全選択（iOS対策含む）
    el.addEventListener('focus', ()=>{
      setTimeout(()=> {
        if (typeof el.select === 'function') {
          el.select();
        }
      }, 0);
    });

    // 入力時：再計算＋保存
    el.addEventListener('input', ()=>{
      calc();
      const d = {};
      flds.forEach(x => d[x.id] = x.value);
      localStorage.setItem(KEY, JSON.stringify(d));
    });

    // Enter / Shift+Enter で上下移動
    el.addEventListener('keydown', e=>{
      if (e.key === 'Enter'){
        e.preventDefault();
        if (e.shiftKey){
          if (flds[i-1]) flds[i-1].focus();
        } else {
          if (flds[i+1]) flds[i+1].focus();
        }
      }
      // Tab / Shift+Tab はブラウザ標準に任せる
    });
  });

  calc();
  if (flds[0]) flds[0].focus();
})();
</script>
</body>
</html>
