    <p>
        <!-- 画像の自動リサイズ -->
        <img id="image" class="resize-image" src="index002.jpg" alt="index002">
    </p>

    <script>
        // 画像の読み込み完了後に実行
        window.onload = function () {
            var img = document.getElementById('image');
            // 画像の表示サイズを調整
            img.onload = function () {
                var maxWidth = img.parentElement.clientWidth; // 親要素の幅
                var naturalWidth = img.naturalWidth; // 元画像の幅
                var naturalHeight = img.naturalHeight; // 元画像の高さ
                // 元画像の幅が親要素の幅を超えている場合のみリサイズ
                if (naturalWidth > maxWidth) {
                    var ratio = maxWidth / naturalWidth;
                    img.width = naturalWidth * ratio;
                    img.height = naturalHeight * ratio;
                }
            };
        };
    </script>
