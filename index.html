<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>トップページ</title>

  <style>
    :root{
      --bg:#f7f8fb;
      --panel:#ffffff;
      --ink:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --accent:#2563eb;
      --accent-weak:#e7efff;
    }
    *{ box-sizing:border-box }
    html,body{ margin:0 }

    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,
        "Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic","Noto Sans JP",Meiryo,sans-serif;
      background:var(--bg);
      color:var(--ink);
      font-weight:400;
    }

    .wrap{
      max-width:760px;
      margin:24px auto;
      padding:24px;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:12px;
      box-shadow:0 2px 12px rgba(0,0,0,.05);
    }

    h1{
      font-size:clamp(1.6rem,1.2rem + 1.2vw,2.2rem);
      margin:0 0 12px;
      color:#888;
      text-align:center;
    }

    h2{
      width:100%;
      margin:24px 0 12px;
      font-size:1.1rem;
      border-left:4px solid var(--accent);
      padding-left:10px;
    }

    p{
      color:#333;
      text-align:center;
      margin:0 0 16px;
    }

    ul{
      list-style:none;
      padding:0;
      margin:0;
    }

    li{
      margin-bottom:8px;
    }

    a{
      display:block;
      padding:12px 16px;
      border-radius:8px;
      border:1px solid var(--border);
      background:#fafafa;
      color:var(--ink);
      text-decoration:none;
      transition:.15s;
    }

    a:hover{
      background:var(--accent-weak);
      border-color:var(--accent);
    }

    img.responsive{
      display:block;
      max-width:100%;
      height:auto;
      margin:20px auto 0;
      border-radius:8px;
      border:1px solid var(--border);
    }

    footer{
      text-align:center;
      margin-top:24px;
      color:var(--muted);
      font-size:.9rem;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>トップページ</h1>
      <p>各種計算ツールへのリンク</p>
    </header>

    <main>
      <h2>計算ツール</h2>
      <ul>
        <li><a href="https://uppooooo.github.io/mm/mix.html">MIX計算機</a></li>
        <li><a href="https://uppooooo.github.io/mm/mixp.html">MIX確率計算</a></li>
        <li><a href="https://uppooooo.github.io/mm/expx.html">経験値倍率計算</a></li>
        <li><a href="https://uppooooo.github.io/mm/huntdata.html">ハントデータ</a></li>
        <li><a href="https://uppooooo.github.io/mm/mixgun.html">MC計算</a></li>
        <li><a href="https://uppooooo.github.io/mm/success.html">成功確率のグラフ</a></li>
        <li><a href="https://uppooooo.github.io/mm/strength.html">簡易強度計算</a></li>
        <li><a href="https://uppooooo.github.io/mm/statuscalk.html">ステータス計算</a></li>
        <li><a href="https://uppooooo.github.io/mm/strengthdetails.html">詳細強度計算</a></li>
      </ul>

      <h2>外部リンク</h2>
      <ul>
        <li><a href="https://ameblo.jp/uppooooo" target="_blank" rel="noopener">uppoのブログ</a></li>
      </ul>

      <!-- トップ画像 -->
      <img src="index002.jpg" alt="トップ画像" class="responsive">
    </main>

    <footer>
      © uppooooo tools
    </footer>
  </div>
</body>
</html>
``
