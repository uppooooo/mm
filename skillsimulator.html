<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>スキルSP計算（完全版）</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="./styles.css">

  <!-- 追加スタイル -->
  <style>
    tr.tier-2 td {
      font-weight: 700;
    }
    .reset-btn {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fef2f2;
      color: #991b1b;
      cursor: pointer;
      font-weight: 600;
    }
    .reset-btn:hover {
      background: #fee2e2;
    }
    tfoot td {
      font-weight: 700;
      background: #f8fafc;
    }
  </style>
</head>

<body>
<div class="container">
  <header>
    <h1>スキルSP計算</h1>
    <p>Lvセルをクリックして取得／再クリックで解除できます。</p>
  </header>

  <main>
    <!-- 所有SP -->
    <form class="form-grid cols-2">
      <label class="label">所有SP</label>
      <input id="ownSP" class="fld" type="number" min="0" max="999">
    </form>

    <button class="reset-btn" id="resetBtn">すべてリセット</button>

    <div class="divider"></div>

    <p id="warn" style="color:#dc2626;font-weight:700;"></p>

    <!-- スキル表 -->
    <table class="skill-table">
      <thead>
        <tr>
          <th>区分</th>
          <th>スキル</th>
          <th>Lv1</th><th>Lv2</th><th>Lv3</th><th>Lv4</th>
          <th>Lv5</th><th>Lv6</th><th>Lv7</th>
          <th>要求SP</th>
        </tr>
      </thead>

      <tbody id="skillBody"></tbody>

      <tfoot>
        <tr>
          <td colspan="9">消費SP 合計</td>
          <td id="usedSP">0</td>
        </tr>
        <tr>
          <td colspan="9">残りSP</td>
          <td id="remainSP">0</td>
        </tr>
        <tr>
          <td colspan="9">消費MP 合計</td>
          <td id="usedMP">0</td>
        </tr>
      </tfoot>
    </table>

    <ul>
      <li><a href="./index.html">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const KEY = 'skill-sp-calc.full.v3';

  const skills = [
    { tier:1, name:'シェル', sp:[3,8,16,24,35,46,60], mp:[7,12,18,25,33,43,55] },
    { tier:1, name:'カウンター', sp:[3,8,16,24,35,46,60], mp:[7,12,18,25,33,43,55] },
    { tier:1, name:'ブレス', sp:[5,13,25,42,65], mp:[15,25,35,50,65] },

    { tier:2, name:'プロミネンス', sp:[15,45], mp:[70,100], req:['ブレス'] }
  ];

  const ownSP = document.getElementById('ownSP');
  const warn = document.getElementById('warn');
  const body = document.getElementById('skillBody');
  const usedSP = document.getElementById('usedSP');
  const remainSP = document.getElementById('remainSP');
  const usedMP = document.getElementById('usedMP');
  const resetBtn = document.getElementById('resetBtn');

  let selected = {};

  function save(){
    localStorage.setItem(KEY, JSON.stringify({ ownSP: ownSP.value, selected }));
  }
  function load(){
    try{
      const d = JSON.parse(localStorage.getItem(KEY));
      if(!d) return;
      ownSP.value = d.ownSP || '';
      selected = d.selected || {};
    }catch{}
  }

  function canSelectSecond(skill){
    if(skill.tier!==2) return true;
    return skill.req.some(r =>
      Object.entries(selected).some(([i,lv]) =>
        skills[i].name===r && lv===skills[i].sp.length-1
      )
    );
  }

  function calc(){
    let sp=0, mp=0;
    Object.entries(selected).forEach(([i,lv])=>{
      sp += skills[i].sp[lv];
      mp += skills[i].mp[lv];
    });
    usedSP.textContent = sp;
    remainSP.textContent = Math.max(0,(+ownSP.value||0)-sp);
    usedMP.textContent = mp;
    save();
  }

  function render(){
    body.innerHTML='';
    skills.forEach((s,i)=>{
      const tr=document.createElement('tr');
      tr.className = s.tier===2 ? 'tier-2':'';

      tr.innerHTML = `<td>${s.tier===1?'1次':'2次'}</td><td>${s.name}</td>`;

      for(let lv=0; lv<7; lv++){
        const td=document.createElement('td');
        if(s.sp[lv]!=null){
          td.textContent=s.sp[lv];
          td.classList.add('lv-cell');
          if(selected[i]===lv) td.classList.add('active');
          if(s.tier===2 && !canSelectSecond(s)) td.classList.add('disabled');
          td.onclick=()=>{
            if(s.tier===2 && !canSelectSecond(s)){
              warn.textContent='2次スキル条件を満たしていません。';
              return;
            }
            if(selected[i]===lv) delete selected[i];
            else selected[i]=lv;
            render(); calc();
          };
        }
        tr.appendChild(td);
      }

      const tdSp=document.createElement('td');
      tdSp.textContent=selected[i]!=null ? s.sp[selected[i]]:'-';
      tr.appendChild(tdSp);

      body.appendChild(tr);
    });
  }

  resetBtn.onclick=()=>{
    selected={};
    warn.textContent='';
    render(); calc();
  };

  load();
  render();
  calc();
  ownSP.addEventListener('input',()=>{ calc(); render(); });
})();
</script>
</body>
</html>
``
