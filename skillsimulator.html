<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>スキルSP計算（完全版）</title>
  <link rel="stylesheet" href="./styles.css*/
    tr.tier-2 td {
      font-weight: 700;
    }
    /* リセットボタン */
    .reset-btn {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fef2f2;
      color: #991b1b;
      cursor: pointer;
      font-weight: 600;
    }
    .reset-btn:hover {
      background: #fee2e2;
    }
    tfoot td {
      font-weight: 700;
      background: #f8fafc;
    }
  </style>
</head>

<body>
<div class="container">
  <header>
    <h1>スキルSP計算</h1>
    <p>Lvセルをクリックして取得／再クリックで解除できます。</p>
  </header>

  <main>
    <!-- 所有SP（1行） -->
    <form class="form-grid cols-2">
      <label class="label">所有SP</label>
      <input id="ownSP" class="fld" type="number" min="0" max="999">
    </form>

    <button class="reset-btn" id="resetBtn">すべてリセット</button>

    <div class="divider"></div>

    <p id="warn" style="color:#dc2626;font-weight:700;"></p>

    <!-- スキル表 -->
    <table class="skill-table">
      <thead>
        <tr>
          <th>区分</th>
          <th>スキル</th>
          <th>Lv1</th><th>Lv2</th><th>Lv3</th><th>Lv4</th>
          <th>Lv5</th><th>Lv6</th><th>Lv7</th>
          <th>要求SP</th>
        </tr>
      </thead>
      <tbody id="skillBody"></tbody>
      <tfoot>
        <tr>
          <td colspan="9">消費SP 合計</td>
          <td id="usedSP">0</td>
        </tr>
        <tr>
          <td colspan="9">残りSP</td>
          <td id="remainSP">0</td>
        </tr>
      </tfoot>
    </table>

    <ul>
      <li><a href="./index.html">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const KEY = 'skill-sp-calc.full.v2';

  const skills = [
    { tier:1, name:'シェル', sp:[3,8,16,24,35,46,60] },
    { tier:1, name:'カウンター', sp:[3,8,16,24,35,46,60] },
    { tier:1, name:'シールド', sp:[5,12,22,35,50] },
    { tier:1, name:'ブレス', sp:[5,13,25,42,65] },
    { tier:1, name:'スナッチ', sp:[3,8,16,26,39,55,75] },
    { tier:1, name:'ポイズン', sp:[20,45,75] },
    { tier:1, name:'ブレイズ', sp:[20,45,75] },
    { tier:1, name:'スタン', sp:[30,55,75,90,100,105] },
    { tier:1, name:'ストライク', sp:[3,8,16,24,35,46,60] },
    { tier:1, name:'ヒーリング', sp:[4,13,27,46,70] },
    { tier:1, name:'アンチド', sp:[18,39,63] },
    { tier:1, name:'バインド', sp:[30,65] },
    { tier:1, name:'フリーズ', sp:[18,39,63] },
    { tier:1, name:'ブースタ', sp:[18,39,63] },
    { tier:1, name:'ハイスピ', sp:[30,65] },

    { tier:2, name:'プロミネンス', sp:[15,45], req:['ブレス'] },
    { tier:2, name:'ヒールシャイン', sp:[15,45], req:['ヒーリング'] },
    { tier:2, name:'ショックスタン', sp:[20], req:['スタン'] },
    { tier:2, name:'ナイトメア', sp:[5,15,25,40,55], req:['シェル','シールド','スナッチ','ストライク'] },
    { tier:2, name:'スロウフォース', sp:[5,15,25,40,55], req:['シェル','シールド','スナッチ','ストライク'] },
    { tier:2, name:'アンチドウェーブ', sp:[30], req:['アンチド'] },
    { tier:2, name:'ポイズンミスト', sp:[30], req:['ポイズン'] }
  ];

  const ownSP = document.getElementById('ownSP');
  const warn = document.getElementById('warn');
  const body = document.getElementById('skillBody');
  const usedSP = document.getElementById('usedSP');
  const remainSP = document.getElementById('remainSP');
  const resetBtn = document.getElementById('resetBtn');

  let selected = {};

  function save(){
    localStorage.setItem(KEY, JSON.stringify({ ownSP: ownSP.value, selected }));
  }

  function load(){
    const d = JSON.parse(localStorage.getItem(KEY));
    if(!d) return;
    ownSP.value = d.ownSP || '';
    selected = d.selected || {};
  }

  function canSelectSecond(skill){
    if(skill.tier!==2) return true;
    return skill.req.some(r =>
      Object.entries(selected).some(([i,lv]) =>
        skills[i].name===r && lv===skills[i].sp.length-1
      )
    );
  }

  function enforceSecondRules(){
    Object.entries(selected).forEach(([i])=>{
      const s=skills[i];
      if(s.tier===2 && !canSelectSecond(s)){
        delete selected[i];
        warn.textContent='前提条件の変更により、2次スキルを解除しました。';
      }
    });
  }

  function calc(){
    let total=0;
    Object.entries(selected).forEach(([i,lv])=>{
      total+=skills[i].sp[lv];
    });
    usedSP.textContent=total;
    remainSP.textContent=Math.max(0,(+ownSP.value||0)-total);
    save();
  }

  function render(){
    body.innerHTML='';
    skills.forEach((s,i)=>{
      const tr=document.createElement('tr');
      tr.className = s.tier===2 ? 'tier-2':'';

      tr.innerHTML=`<td>${s.tier===1?'1次':'2次'}</td><td>${s.name}</td>`;

      for(let lv=0;lv<7;lv++){
        const td=document.createElement('td');
        if(s.sp[lv]!=null){
          td.textContent=s.sp[lv];
          td.className='lv-cell';
          if(selected[i]===lv) td.classList.add('active');
          if(s.tier===2&&!canSelectSecond(s)) td.classList.add('disabled');
          td.onclick=()=>{
            if(s.tier===2&&!canSelectSecond(s)){
              warn.textContent='2次スキル条件を満たしていません。';return;
            }
            if(selected[i]===lv){delete selected[i];}
            else{selected[i]=lv;}
            enforceSecondRules(); render(); calc();
          };
        }
        tr.appendChild(td);
      }

      const tdSp=document.createElement('td');
      tdSp.textContent=selected[i]!=null ? s.sp[selected[i]]:'-';
      tr.appendChild(tdSp);

      body.appendChild(tr);
    });
  }

  resetBtn.onclick=()=>{
    selected={};
    warn.textContent='';
    render(); calc();
  };

  load();
  enforceSecondRules();
  render();
  calc();
  ownSP.addEventListener('input',()=>{ calc(); render(); });
})();
</script>
</body>
</html>
