<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>スキルSP計算（完全版）</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
<div class="container">
  <header>
    <h1>スキルSP計算</h1>
    <p>Lvセルをクリックして取得／再クリックで解除できます。</p>
  </header>

  <main>
    <!-- 所有SP（1行） -->
    <form class="form-grid cols-2">
      <label class="label">所有SP</label>
      <input id="ownSP" class="fld" type="number" min="0" max="999">
    </form>

    <div class="divider"></div>

    <p id="warn" style="color:#dc2626;font-weight:700;"></p>

    <!-- スキル表 -->
    <table class="skill-table">
      <thead>
        <tr>
          <th>区分</th>
          <th>スキル</th>
          <th>Lv1</th><th>Lv2</th><th>Lv3</th><th>Lv4</th>
          <th>Lv5</th><th>Lv6</th><th>Lv7</th>
          <th>消費MP</th>
        </tr>
      </thead>
      <tbody id="skillBody"></tbody>
    </table>

    <div class="divider"></div>

    <!-- 結果 -->
    <section class="result-panel">
      <div class="row total">消費SP：<span id="usedSP">0</span></div>
      <div class="row total">残りSP：<span id="remainSP">0</span></div>
      <ul id="resultList"></ul>
    </section>

    <ul>
      <li><a href="./index.html">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const KEY = 'skill-sp-calc.full.v1';

  /* =========================
     全スキル定義
     ========================= */
  const skills = [
    /* ---------- 1次 ---------- */
    { tier:1, name:'シェル', sp:[3,8,16,24,35,46,60], mp:[7,12,18,25,33,43,55], next:['ナイトメア','スロウフォース'] },
    { tier:1, name:'カウンター', sp:[3,8,16,24,35,46,60], mp:[7,12,18,25,33,43,55] },
    { tier:1, name:'シールド', sp:[5,12,22,35,50], mp:[10,20,30,40,50], next:['ナイトメア','スロウフォース'] },
    { tier:1, name:'ブレス', sp:[5,13,25,42,65], mp:[15,25,35,50,65], next:['プロミネンス'] },
    { tier:1, name:'スナッチ', sp:[3,8,16,26,39,55,75], mp:[20,30,40,50,60,70,80], next:['ナイトメア','スロウフォース'] },
    { tier:1, name:'ポイズン', sp:[20,45,75], mp:[60,70,80], next:['ポイズンミスト'] },
    { tier:1, name:'ブレイズ', sp:[20,45,75], mp:[60,70,80] },
    { tier:1, name:'スタン', sp:[30,55,75,90,100,105], mp:[40,50,60,70,80,90], next:['ショックスタン'] },
    { tier:1, name:'ストライク', sp:[3,8,16,24,35,46,60], mp:[7,12,18,26,35,46,60], next:['ナイトメア','スロウフォース'] },
    { tier:1, name:'ヒーリング', sp:[4,13,27,46,70], mp:[16,30,40,60,70], next:['ヒールシャイン'] },
    { tier:1, name:'アンチド', sp:[18,39,63], mp:[40,50,60], next:['アンチドウェーブ'] },
    { tier:1, name:'バインド', sp:[30,65], mp:[50,70] },
    { tier:1, name:'フリーズ', sp:[18,39,63], mp:[50,60,70] },
    { tier:1, name:'ブースタ', sp:[18,39,63], mp:[50,60,70] },
    { tier:1, name:'ハイスピ', sp:[30,65], mp:[50,70] },

    /* ---------- 2次 ---------- */
    { tier:2, name:'プロミネンス', sp:[15,45], mp:[70,100], req:['ブレス'] },
    { tier:2, name:'ヒールシャイン', sp:[15,45], mp:[70,100], req:['ヒーリング'] },
    { tier:2, name:'ショックスタン', sp:[20], mp:[110], req:['スタン'] },
    { tier:2, name:'ナイトメア', sp:[5,15,25,40,55], mp:[40,50,60,70,80], req:['シェル','シールド','スナッチ','ストライク'] },
    { tier:2, name:'スロウフォース', sp:[5,15,25,40,55], mp:[40,50,60,70,80], req:['シェル','シールド','スナッチ','ストライク'] },
    { tier:2, name:'アンチドウェーブ', sp:[30], mp:[120], req:['アンチド'] },
    { tier:2, name:'ポイズンミスト', sp:[30], mp:[120], req:['ポイズン'] }
  ];

  /* ========================= */

  const ownSP = document.getElementById('ownSP');
  const warn = document.getElementById('warn');
  const body = document.getElementById('skillBody');
  const usedSP = document.getElementById('usedSP');
  const remainSP = document.getElementById('remainSP');
  const list = document.getElementById('resultList');

  let selected = {};

  /* ---------- 保存／復元 ---------- */
  function save(){
    localStorage.setItem(KEY, JSON.stringify({ ownSP: ownSP.value, selected }));
  }
  function load(){
    try{
      const d = JSON.parse(localStorage.getItem(KEY));
      if(!d) return;
      ownSP.value = d.ownSP || '';
      selected = d.selected || {};
    }catch{}
  }

  /* ---------- 2次条件判定 ---------- */
  function canSelectSecond(skill){
    if(skill.tier !== 2) return true;
    return skill.req.some(r =>
      Object.entries(selected).some(([i,lv]) =>
        skills[i].name === r &&
        lv === skills[i].sp.length - 1
      )
    );
  }

  /* ---------- 条件崩壊時リセット ---------- */
  function enforceSecondRules(){
    Object.entries(selected).forEach(([i])=>{
      const s = skills[i];
      if(s.tier===2 && !canSelectSecond(s)){
        delete selected[i];
        warn.textContent = '前提条件の変更により、2次スキルを解除しました。';
      }
    });
  }

  /* ---------- 計算 ---------- */
  function calc(){
    let total = 0;
    list.innerHTML = '';
    warn.textContent ||= '';

    Object.entries(selected).forEach(([i,lv])=>{
      const s = skills[i];
      total += s.sp[lv];
      const li = document.createElement('li');
      li.textContent = `${s.name} Lv${Number(lv)+1}（MP ${s.mp[lv]}）`;
      list.appendChild(li);
    });

    usedSP.textContent = total;
    remainSP.textContent = Math.max(0,(+ownSP.value||0)-total);
    save();
  }

  /* ---------- 描画 ---------- */
  function render(){
    body.innerHTML='';
    skills.forEach((s,i)=>{
      const tr = document.createElement('tr');

      tr.innerHTML = `<td>${s.tier===1?'1次':'2次'}</td><td>${s.name}</td>`;

      for(let lv=0; lv<7; lv++){
        const td = document.createElement('td');
        if(s.sp[lv]!=null){
          td.textContent = `Lv${lv+1}`;
          td.classList.add('lv-cell');
          if(selected[i]===lv) td.classList.add('active');
          if(s.tier===2 && !canSelectSecond(s)) td.classList.add('disabled');

          td.onclick = ()=>{
            if(s.tier===2 && !canSelectSecond(s)){
              warn.textContent='2次スキル条件を満たしていません。';
              return;
            }
            if(selected[i]===lv){
              delete selected[i];  // 解除
            }else{
              selected[i]=lv;
            }
            enforceSecondRules();
            render(); calc();
          };
        }
        tr.appendChild(td);
      }

      const tdMp=document.createElement('td');
      tdMp.textContent = selected[i]!=null ? s.mp[selected[i]]:'-';
      tr.appendChild(tdMp);

      body.appendChild(tr);
    });
  }

  load();
  enforceSecondRules();
  render();
  calc();
  ownSP.addEventListener('input',()=>{ calc(); render(); });
})();
</script>
</body>
</html>
