<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>スキルSP計算</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
<div class="container">
  <header>
    <h1>スキルSP計算</h1>
    <p>Lvをクリックして取得スキルを選択してください。</p>
  </header>

  <main>
    <!-- 所有SP -->
    <form class="form-grid cols-1">
      <label class="label">所有SP</label>
      <input id="ownSP" class="fld" type="number" min="0">
    </form>

    <div class="divider"></div>

    <!-- 警告 -->
    <p id="warn" style="color:#dc2626;font-weight:700;"></p>

    <!-- スキル表 -->
    <table class="skill-table">
      <thead>
        <tr>
          <th>区分</th>
          <th>スキル</th>
          <th>Lv1</th><th>Lv2</th><th>Lv3</th><th>Lv4</th><th>Lv5</th><th>Lv6</th><th>Lv7</th>
          <th>消費MP</th>
        </tr>
      </thead>
      <tbody id="skillBody"></tbody>
    </table>

    <div class="divider"></div>

    <!-- 結果 -->
    <section class="result-panel">
      <div class="row total">消費SP：<span id="usedSP">0</span></div>
      <div class="row total">残りSP：<span id="remainSP">0</span></div>

      <ul id="resultList"></ul>
    </section>

    <ul>
      <li><a href="./index.html">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const KEY = 'skill-sp-calc.v1';

  const skills = [
    { tier:1, name:'シェル', sp:[3,8,16,24,35,46,60], mp:[7,12,18,25,33,43,55], next:['ナイトメア','スロウフォース'] },
    { tier:1, name:'ブレス', sp:[5,13,25,42,65], mp:[15,25,35,50,65], next:['プロミネンス'] },
    { tier:2, name:'プロミネンス', sp:[15,45], mp:[70,100], req:['ブレス'] }
  ];

  const ownSP = document.getElementById('ownSP');
  const warn = document.getElementById('warn');
  const body = document.getElementById('skillBody');
  const usedSP = document.getElementById('usedSP');
  const remainSP = document.getElementById('remainSP');
  const list = document.getElementById('resultList');

  let selected = {};

  function save(){
    localStorage.setItem(KEY, JSON.stringify({
      ownSP: ownSP.value,
      selected
    }));
  }

  function load(){
    const d = JSON.parse(localStorage.getItem(KEY));
    if(!d) return;
    ownSP.value = d.ownSP || '';
    selected = d.selected || {};
  }

  function canSelect(skill, lv){
    if(skill.tier===2){
      return skill.req.some(r=>{
        return Object.entries(selected).some(([k,v])=>{
          const s = skills[k];
          return s.name===r && v===s.sp.length-1;
        });
      });
    }
    return true;
  }

  function calc(){
    let total = 0;
    warn.textContent = '';
    list.innerHTML = '';

    Object.entries(selected).forEach(([i,lv])=>{
      const s = skills[i];
      total += s.sp[lv];
      const li=document.createElement('li');
      li.textContent=`${s.name} Lv${+lv+1}（MP ${s.mp[lv]}）`;
      list.appendChild(li);
    });

    usedSP.textContent = total;
    remainSP.textContent = Math.max(0,(+ownSP.value||0)-total);

    save();
  }

  function render(){
    body.innerHTML='';
    skills.forEach((s,i)=>{
      const tr=document.createElement('tr');
      tr.innerHTML = `<td>${s.tier===1?'1次':'2次'}</td><td>${s.name}</td>`;
      for(let lv=0;lv<7;lv++){
        const td=document.createElement('td');
        if(s.sp[lv]!=null){
          td.textContent=s.sp[lv];
          td.className='lv-cell';
          if(selected[i]==lv) td.classList.add('active');
          if(!canSelect(s,lv)) td.classList.add('disabled');
          td.onclick=()=>{
            if(!canSelect(s,lv)){
              warn.textContent='2次スキル条件を満たしていません。';
              return;
            }
            selected[i]=lv;
            render(); calc();
          };
        }
        tr.appendChild(td);
      }
      tr.innerHTML += `<td>${selected[i]!=null?s.mp[selected[i]]:'-'}</td>`;
      body.appendChild(tr);
    });
  }

  load();
  render();
  calc();
  ownSP.addEventListener('input',()=>{calc();render();});
})();
</script>
</body>
</html>
