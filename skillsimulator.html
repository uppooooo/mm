<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>スキルSP計算</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
<div class="container">
  <header>
    <h1>スキルSP計算</h1>
    <p>Lvをクリックして取得スキルを選択してください。</p>
  </header>

  <main>
    <!-- 所有SP -->
    <form class="form-grid cols-1">
      <label class="label">所有SP</label>
      <input id="ownSP" class="fld" type="number" min="0">
    </form>

    <div class="divider"></div>

    <!-- 警告 -->
    <p id="warn" style="color:#dc2626;font-weight:700;"></p>

    <!-- スキル表 -->
    <table class="skill-table">
      <thead>
        <tr>
          <th>区分</th>
          <th>スキル</th>
          <th>Lv1</th><th>Lv2</th><th>Lv3</th><th>Lv4</th>
          <th>Lv5</th><th>Lv6</th><th>Lv7</th>
          <th>消費MP</th>
        </tr>
      </thead>
      <tbody id="skillBody"></tbody>
    </table>

    <div class="divider"></div>

    <!-- 結果 -->
    <section class="result-panel">
      <div class="row total">消費SP：<span id="usedSP">0</span></div>
      <div class="row total">残りSP：<span id="remainSP">0</span></div>
      <ul id="resultList"></ul>
    </section>

    <ul>
      <li><a href="./index.html">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const KEY = 'skill-sp-calc.v1';

  const skills = [
    { tier:1, name:'シェル', sp:[3,8,16,24,35,46,60], mp:[7,12,18,25,33,43,55], next:['ナイトメア','スロウフォース'] },
    { tier:1, name:'ブレス', sp:[5,13,25,42,65], mp:[15,25,35,50,65], next:['プロミネンス'] },
    { tier:2, name:'プロミネンス', sp:[15,45], mp:[70,100], req:['ブレス'] }
  ];

  const ownSP    = document.getElementById('ownSP');
  const warn     = document.getElementById('warn');
  const body     = document.getElementById('skillBody');
  const usedSP   = document.getElementById('usedSP');
  const remainSP = document.getElementById('remainSP');
  const list     = document.getElementById('resultList');

  let selected = {};

  /* ---------- 保存・復元 ---------- */
  function save(){
    localStorage.setItem(KEY, JSON.stringify({
      ownSP: ownSP.value,
      selected
    }));
  }

  function load(){
    try {
      const d = JSON.parse(localStorage.getItem(KEY));
      if (!d) return;
      ownSP.value = d.ownSP || '';
      selected = d.selected || {};
    } catch {}
  }

  /* ---------- 2次スキル条件 ---------- */
  function canSelect(skill){
    if (skill.tier !== 2) return true;
    return skill.req.some(reqName =>
      Object.entries(selected).some(([i,lv]) =>
        skills[i].name === reqName &&
        lv === skills[i].sp.length - 1
      )
    );
  }

  /* ---------- 計算 ---------- */
  function calc(){
    let total = 0;
    warn.textContent = '';
    list.innerHTML = '';

    Object.entries(selected).forEach(([i,lv])=>{
      const s = skills[i];
      total += s.sp[lv];

      const li = document.createElement('li');
      li.textContent = `${s.name} Lv${Number(lv)+1}（MP ${s.mp[lv]}）`;
      list.appendChild(li);

      if (s.tier === 2 && !canSelect(s)){
        warn.textContent = '2次スキル取得条件（1次スキル最大Lv）を満たしていません。';
      }
    });

    usedSP.textContent = total;
    remainSP.textContent = Math.max(0, (+ownSP.value || 0) - total);
    save();
  }

  /* ---------- 描画（★完全修正版） ---------- */
  function render(){
    body.innerHTML = '';

    skills.forEach((s,i)=>{
      const tr = document.createElement('tr');

      // 区分
      const tdTier = document.createElement('td');
      tdTier.textContent = s.tier === 1 ? '1次' : '2次';
      tr.appendChild(tdTier);

      // スキル名
      const tdName = document.createElement('td');
      tdName.textContent = s.name;
      tr.appendChild(tdName);

      // Lv選択セル
      for(let lv=0; lv<7; lv++){
        const td = document.createElement('td');

        if (s.sp[lv] != null){
          td.textContent = s.sp[lv];
          td.classList.add('lv-cell');

          if (selected[i] === lv) td.classList.add('active');
          if (!canSelect(s) && s.tier === 2) td.classList.add('disabled');

          td.addEventListener('click', ()=>{
            if (s.tier === 2 && !canSelect(s)){
              warn.textContent = '2次スキル条件を満たしていません。';
              return;
            }
            selected[i] = lv;
            render();
            calc();
          });
        }

        tr.appendChild(td);
      }

      // 消費MP
      const tdMp = document.createElement('td');
      tdMp.textContent = selected[i] != null ? s.mp[selected[i]] : '-';
      tr.appendChild(tdMp);

      body.appendChild(tr);
    });
  }

  /* ---------- 初期化 ---------- */
  load();
  render();
  calc();
  ownSP.addEventListener('input', () => { calc(); render(); });
})();
</script>
</body>
</html>
