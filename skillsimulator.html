<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>スキルSP計算</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
<div class="container">
  <header>
    <h1>スキルSP計算</h1>
    <p>Lvをクリックして取得／解除できます。</p>
  </header>

  <main>
    <!-- 所有SP：1行表示 -->
    <form class="form-grid cols-2">
      <label class="label">所有SP</label>
      <input id="ownSP" class="fld" type="number" min="0" max="999">
    </form>

    <div class="divider"></div>

    <p id="warn" style="color:#dc2626;font-weight:700;"></p>

    <!-- スキル表（SPは表示しない） -->
    <table class="skill-table">
      <thead>
        <tr>
          <th>区分</th>
          <th>スキル</th>
          <th>Lv1</th><th>Lv2</th><th>Lv3</th><th>Lv4</th>
          <th>Lv5</th><th>Lv6</th><th>Lv7</th>
          <th>消費MP</th>
        </tr>
      </thead>
      <tbody id="skillBody"></tbody>
    </table>

    <div class="divider"></div>

    <section class="result-panel">
      <div class="row total">消費SP：<span id="usedSP">0</span></div>
      <div class="row total">残りSP：<span id="remainSP">0</span></div>
      <ul id="resultList"></ul>
    </section>

    <ul>
      <li><a href="./index.html">トップページ</a></li>
    </ul>
  </main>
</div>

<script>
(function(){
  const KEY = 'skill-sp-calc.v2';

  const skills = [
    { tier:1, name:'シェル', sp:[3,8,16,24,35,46,60], mp:[7,12,18,25,33,43,55] },
    { tier:1, name:'ブレス', sp:[5,13,25,42,65], mp:[15,25,35,50,65] },
    { tier:2, name:'プロミネンス', sp:[15,45], mp:[70,100], req:['ブレス'] }
  ];

  const ownSP = document.getElementById('ownSP');
  const warn = document.getElementById('warn');
  const body = document.getElementById('skillBody');
  const usedSP = document.getElementById('usedSP');
  const remainSP = document.getElementById('remainSP');
  const list = document.getElementById('resultList');

  let selected = {};

  /* ---------- 保存／復元 ---------- */
  function save(){
    localStorage.setItem(KEY, JSON.stringify({ ownSP: ownSP.value, selected }));
  }
  function load(){
    try{
      const d = JSON.parse(localStorage.getItem(KEY));
      if(!d) return;
      ownSP.value = d.ownSP || '';
      selected = d.selected || {};
    }catch{}
  }

  /* ---------- 2次条件判定 ---------- */
  function canSelectSecond(skill){
    if(skill.tier !== 2) return true;
    return skill.req.some(r =>
      Object.entries(selected).some(([i,lv]) =>
        skills[i].name === r && lv === skills[i].sp.length - 1
      )
    );
  }

  /* ---------- 2次リセット処理 ---------- */
  function enforceSecondRules(){
    Object.entries(selected).forEach(([i,lv])=>{
      const s = skills[i];
      if(s.tier === 2 && !canSelectSecond(s)){
        delete selected[i];
        warn.textContent = '前提条件が崩れたため、2次スキルを解除しました。';
      }
    });
  }

  /* ---------- 計算 ---------- */
  function calc(){
    let total = 0;
    list.innerHTML = '';
    warn.textContent ||= '';

    Object.entries(selected).forEach(([i,lv])=>{
      const s = skills[i];
      total += s.sp[lv];
      const li = document.createElement('li');
      li.textContent = `${s.name} Lv${Number(lv)+1}（MP ${s.mp[lv]}）`;
      list.appendChild(li);
    });

    usedSP.textContent = total;
    remainSP.textContent = Math.max(0,(+ownSP.value||0) - total);
    save();
  }

  /* ---------- 描画 ---------- */
  function render(){
    body.innerHTML = '';
    skills.forEach((s,i)=>{
      const tr = document.createElement('tr');

      const tdTier = document.createElement('td');
      tdTier.textContent = s.tier === 1 ? '1次' : '2次';
      tr.appendChild(tdTier);

      const tdName = document.createElement('td');
      tdName.textContent = s.name;
      tr.appendChild(tdName);

      for(let lv=0; lv<7; lv++){
        const td = document.createElement('td');

        if(s.sp[lv] != null){
          td.classList.add('lv-cell');
          if(selected[i] === lv) td.classList.add('active');
          if(s.tier===2 && !canSelectSecond(s)) td.classList.add('disabled');
          td.textContent = `Lv${lv+1}`;

          td.onclick = () => {
            if(s.tier===2 && !canSelectSecond(s)){
              warn.textContent = '2次スキル取得条件を満たしていません。';
              return;
            }
            if(selected[i] === lv){
              delete selected[i];   // ← 解除
            }else{
              selected[i] = lv;
            }
            enforceSecondRules();
            render(); calc();
          };
        }
        tr.appendChild(td);
      }

      const tdMp = document.createElement('td');
      tdMp.textContent = selected[i]!=null ? s.mp[selected[i]] : '-';
      tr.appendChild(tdMp);

      body.appendChild(tr);
    });
  }

  load();
  enforceSecondRules();
  render();
  calc();
  ownSP.addEventListener('input', ()=>{ calc(); render(); });
})();
</script>
</body>
</html>
``
